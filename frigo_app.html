<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Frigorífico Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #f0f2f5; 
            padding: 15px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .card { 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            border: none; 
            max-width: 480px; 
            margin: auto; 
            overflow: hidden;
        }

        .header-accent {
            background: #ffffff;
            padding: 25px;
            text-align: center;
            border-bottom: 4px solid #0d6efd; /* Azul para Frío */
        }

        .logo-img { height: 60px; width: auto; margin-bottom: 10px; }
        
        .form-label { font-size: 0.75rem; color: #555; margin-bottom: 4px; text-transform: uppercase; }
        
        .input-group-text { background-color: #fff; border-right: none; color: #0d6efd; }
        .form-control { border-left: none; padding: 12px; font-size: 1rem; }
        .form-control:focus { box-shadow: none; border-color: #ced4da; }
        
        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
            border-radius: 0.375rem;
        }

        .btn-save {
            padding: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            border-radius: 12px;
            transition: all 0.3s;
            background-color: #0d6efd;
            border: none;
        }

        .btn-save:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3); 
            background-color: #0b5ed7;
        }

        .file-label {
            display: block;
            background: #e9ecef;
            border: 2px dashed #ced4da;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .file-label:hover { background: #dee2e6; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="card">
        <div class="header-accent">
            <img src="logo-icono.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
            <h4 class="fw-bold mb-0" style="color: #333;">CONTROL FRIGORÍFICO</h4>
            <p class="text-muted small mb-0"><i class="bi bi-snow me-1"></i> Monitoreo de Cámaras</p>
        </div>

        <div class="card-body p-4">
            <form id="formFrigo">
                <div class="mb-3">
                    <label class="form-label fw-bold">OPERADOR RESPONSABLE</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                        <input type="text" id="operador" class="form-control" placeholder="Nombre completo" required>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label fw-bold">CÁMARA 1 (°C)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-thermometer-snow"></i></span>
                            <input type="number" id="c1" class="form-control" step="0.1" placeholder="0.0" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold">CÁMARA 2 (°C)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-thermometer-snow"></i></span>
                            <input type="number" id="c2" class="form-control" step="0.1" placeholder="0.0" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold">CÁMARA 3 (°C)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-thermometer-snow"></i></span>
                            <input type="number" id="c3" class="form-control" step="0.1" placeholder="0.0" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold">CÁMARA 4 (°C)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-thermometer-snow"></i></span>
                            <input type="number" id="c4" class="form-control" step="0.1" placeholder="0.0" required>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">OBSERVACIONES</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-chat-left-text"></i></span>
                        <input type="text" id="observaciones" class="form-control" placeholder="Ej: Todo en rango">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">EVIDENCIA FOTOGRÁFICA</label>
                    <input type="file" id="fotoInput" class="form-control d-none" accept="image/*" capture="environment">
                    <label for="fotoInput" class="file-label" id="fileLabel">
                        <i class="bi bi-camera-fill fs-3 d-block text-primary"></i>
                        <span id="fileName">Tocar para tomar foto</span>
                    </label>
                </div>

                <button type="submit" id="btnEnviar" class="btn btn-primary w-100 btn-save shadow-sm">
                    <i class="bi bi-cloud-upload me-2"></i>GUARDAR TEMPERATURAS
                </button>
            </form>
        </div>
    </div>
    
    <div id="mensaje" class="alert alert-primary mt-3 d-none text-center fw-bold">
        ✅ TEMPERATURAS REGISTRADAS
    </div>
</div>

<script>
    // USA EL MISMO WEB_APP_URL QUE VACIADO
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbydljHZufiqe5x-2Bn83pjBqrRdqzkZadfaVi9uIDKj2i-Q7WZG9g3ISL7mErpk49wefw/exec";

    document.getElementById('fotoInput').addEventListener('change', function(e) {
        const name = e.target.files[0] ? "✅ Foto cargada" : "Tocar para tomar foto";
        document.getElementById('fileName').innerText = name;
        document.getElementById('fileLabel').style.borderColor = "#0d6efd";
    });

    document.getElementById('formFrigo').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const fotoFile = document.getElementById('fotoInput').files[0];
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> PROCESANDO...';

        if (fotoFile) {
            const reader = new FileReader();
            reader.onloadend = () => enviarDatos(reader.result);
            reader.readAsDataURL(fotoFile);
        } else {
            enviarDatos(null);
        }
    });

    function enviarDatos(fotoBase64) {
        const datos = {
            origen: "frigorifico", // IMPORTANTE: Esto le dice al Script que guarde en la hoja 'Frigorifico'
            operador: document.getElementById('operador').value,
            c1: document.getElementById('c1').value,
            c2: document.getElementById('c2').value,
            c3: document.getElementById('c3').value,
            c4: document.getElementById('c4').value,
            observaciones: document.getElementById('observaciones').value || "Sin observaciones",
            foto: fotoBase64
        };

        fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
        .then(() => {
            const msj = document.getElementById('mensaje');
            msj.classList.remove('d-none');
            document.getElementById('formFrigo').reset();
            document.getElementById('fileName').innerText = "Tocar para tomar foto";
            document.getElementById('fileLabel').style.borderColor = "#ced4da";
            
            setTimeout(() => { msj.classList.add('d-none'); }, 3000);
        })
        .finally(() => {
            const btn = document.getElementById('btnEnviar');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-cloud-upload me-2"></i>GUARDAR TEMPERATURAS';
        });
    }
</script>
</body>
</html>
