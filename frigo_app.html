<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Frigorífico Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f0f2f5; padding: 10px; font-family: sans-serif; }
        .card { border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: none; max-width: 500px; margin: auto; overflow: hidden; }
        .header-blue { background: #ffffff; padding: 15px; text-align: center; border-bottom: 4px solid #0d6efd; }
        .logo-img { height: 60px; margin-bottom: 5px; object-fit: contain; }
        .form-label { font-size: 0.75rem; font-weight: bold; color: #444; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .input-group-text { background-color: #fff; color: #0d6efd; border-right: none; padding: 0.5rem; }
        .form-control, .form-select { border-left: none; font-size: 0.9rem; }
        .variedad-badge { background: #e7f1ff; color: #0d6efd; padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; display: inline-block; margin: 2px; border: 1px solid #0d6efd; }
        
        /* Estilo para nuevas filas de pulpa */
        .pulp-item { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 12px; padding: 8px; margin-bottom: 8px; }
        .obs-input { display: none; margin-top: 5px; font-size: 0.8rem; border-left: 3px solid #0d6efd !important; border-radius: 0 8px 8px 0; }
        
        .btn-add { font-size: 0.8rem; padding: 2px 10px; }
        .btn-save { padding: 15px; font-weight: bold; border-radius: 12px; background: #0d6efd; border: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container py-2">
    <div class="card shadow">
        <div class="header-blue">
            <img src="logo-icono.png" alt="Logo" class="logo-img">
            <h5 class="fw-bold mb-0">CONTROL FRIGORÍFICO</h5>
            <p class="text-muted small mb-0">MONITOREO DE CÁMARAS</p>
        </div>

        <div class="card-body p-3">
            <form id="formFrigo">
                <div class="row g-2 mb-3">
                    <div class="col-8">
                        <label class="form-label">OPERADOR</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                            <input type="text" id="operador" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-4">
                        <label class="form-label">CÁMARA</label>
                        <select id="camara" class="form-select" style="border-left: 1px solid #dee2e6" required>
                            <option value="">N°</option>
                            <script>for(let i=2; i<=12; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label">VARIEDADES EN CÁMARA</label>
                        <button type="button" class="btn btn-outline-primary btn-add mb-1" onclick="agregarVariedad()">
                            <i class="bi bi-plus-lg"></i> Agregar
                        </button>
                    </div>
                    <div id="lista-variedades" class="mb-2"></div>
                    <select id="selector-variedad" class="form-select" style="border-left: 1px solid #dee2e6">
                        <option value="">Seleccionar variedad...</option>
                        <option value="Galas">Galas</option>
                        <option value="Granny">Granny</option>
                        <option value="Fuji">Fuji</option>
                        <option value="Red Delicius">Red Delicius</option>
                        <option value="Cripps Pink">Cripps Pink</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label text-primary"><i class="bi bi-thermometer-snow"></i> T° AMBIENTE (°C)</label>
                    <input type="number" id="tAmbiente" class="form-control text-center fw-bold" step="0.1" style="border-left: 1px solid #dee2e6" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-danger"><i class="bi bi-thermometer-half"></i> T° PULPA INDIVIDUAL (6 FRUTOS)</label>
                    <div id="pulpas-contenedor">
                        <script>
                            for(let i=1; i<=6; i++) {
                                document.write(`
                                    <div class="pulp-item">
                                        <div class="input-group">
                                            <span class="input-group-text fw-bold" style="font-size:0.7rem; min-width:40px">P${i}</span>
                                            <input type="number" class="form-control t-pulpa text-center fw-bold" step="0.1" placeholder="0.0" id="p${i}" required>
                                            <button type="button" class="btn btn-outline-secondary" onclick="toggleObs(${i})">
                                                <i class="bi bi-plus"></i> <i class="bi bi-chat-text"></i>
                                            </button>
                                        </div>
                                        <input type="text" id="obs-p${i}" class="form-control obs-input" placeholder="Observación del fruto ${i}...">
                                    </div>
                                `);
                            }
                        </script>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label text-info"><i class="bi bi-droplets-fill"></i> HUMEDAD (%)</label>
                    <input type="number" id="humedad" class="form-control text-center fw-bold" style="border-left: 1px solid #dee2e6" required>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-journal-text"></i> OBSERVACIÓN GENERAL</label>
                    <textarea id="obsGeneral" class="form-control" rows="2" style="border-left: 1px solid #dee2e6" placeholder="Detalles de la cámara..."></textarea>
                </div>

                <div class="mb-4">
                    <input type="file" id="fotoInput" class="d-none" accept="image/*" capture="environment">
                    <label for="fotoInput" class="file-label" id="fileLabel" style="display: block; border: 2px dashed #ccc; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer;">
                        <i class="bi bi-camera fs-2 d-block mb-1 text-primary"></i>
                        <span id="fileName" class="fw-bold">TOCAR PARA TOMAR FOTO</span>
                    </label>
                </div>

                <button type="submit" id="btnEnviar" class="btn btn-primary w-100 btn-save">GUARDAR REGISTRO</button>
            </form>
        </div>
    </div>
    <div id="mensaje" class="alert alert-primary mt-3 d-none text-center fw-bold">✅ ENVIADO</div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxWr-OYFzfjzwGOZzYkMAfyI-yShxOrd6qtpK_PGgSr5teU7AgeVL1pOEkH5F9zRhlUdw/exec";
    let variedadesSeleccionadas = [];

    function toggleObs(id) {
        const el = document.getElementById(`obs-p${id}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function agregarVariedad() {
        const sel = document.getElementById('selector-variedad');
        const valor = sel.value;
        if (valor && !variedadesSeleccionadas.includes(valor)) {
            variedadesSeleccionadas.push(valor);
            renderVariedades();
        }
        sel.value = "";
    }

    function eliminarVariedad(v) {
        variedadesSeleccionadas = variedadesSeleccionadas.filter(item => item !== v);
        renderVariedades();
    }

    function renderVariedades() {
        const cont = document.getElementById('lista-variedades');
        cont.innerHTML = variedadesSeleccionadas.map(v => `
            <span class="variedad-badge">
                ${v} <i class="bi bi-x-circle-fill ms-1" style="cursor:pointer" onclick="eliminarVariedad('${v}')"></i>
            </span>
        `).join('');
    }

    document.getElementById('formFrigo').addEventListener('submit', function(e) {
        e.preventDefault();
        if (variedadesSeleccionadas.length === 0) { alert("Agrega al menos una variedad"); return; }

        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;

        // Construir el detalle de notas de pulpas
        let detalleNotas = [];
        for(let i=1; i<=6; i++){
            const val = document.getElementById(`p${i}`).value;
            const obs = document.getElementById(`obs-p${i}`).value;
            detalleNotas.push(`P${i}: ${val}°${obs ? ' ('+obs+')' : ''}`);
        }

        const enviar = (base64) => {
            const datos = {
                origen: "frigorifico",
                operador: document.getElementById('operador').value,
                variedad: variedadesSeleccionadas.join(', '),
                camara: document.getElementById('camara').value,
                tAmbiente: document.getElementById('tAmbiente').value,
                // Enviamos las 6 pulpas individuales
                p1: document.getElementById('p1').value,
                p2: document.getElementById('p2').value,
                p3: document.getElementById('p3').value,
                p4: document.getElementById('p4').value,
                p5: document.getElementById('p5').value,
                p6: document.getElementById('p6').value,
                humedad: document.getElementById('humedad').value,
                obsGeneral: document.getElementById('obsGeneral').value,
                pulpasDetalle: detalleNotas.join(' | '),
                foto: base64
            };

            fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
            .then(() => {
                document.getElementById('mensaje').classList.remove('d-none');
                setTimeout(() => location.reload(), 2000);
            });
        };

        const file = document.getElementById('fotoInput').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => enviar(reader.result);
            reader.readAsDataURL(file);
        } else { enviar(null); }
    });

    document.getElementById('fotoInput').onchange = function() {
        if(this.files[0]) document.getElementById('fileName').innerText = "FOTO: " + this.files[0].name;
    };
</script>
</body>
</html>
