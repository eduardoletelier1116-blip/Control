<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Frigorífico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f0f2f5; padding: 15px; font-family: sans-serif; }
        .card { border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: none; max-width: 450px; margin: auto; overflow: hidden; }
        .header-blue { background: #ffffff; padding: 20px; text-align: center; border-bottom: 4px solid #0d6efd; }
        .logo-img { height: 70px; margin-bottom: 10px; object-fit: contain; }
        .form-label { font-size: 0.8rem; font-weight: bold; color: #444; text-transform: uppercase; }
        
        .input-group-text { background-color: #fff; color: #0d6efd; border-right: none; }
        .form-control, .form-select { border-left: none; }
        .form-control:focus, .form-select:focus { box-shadow: none; border-color: #ced4da; }
        
        .btn-save { padding: 15px; font-weight: bold; border-radius: 12px; background: #0d6efd; border: none; transition: 0.3s; }
        .btn-save:active { transform: scale(0.95); }
        
        .file-label { display: block; background: #f8f9fa; border: 2px dashed #dee2e6; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; }
        .icon-small { font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container py-2">
    <div class="card shadow">
        <div class="header-blue">
            <img src="logo-icono.png" alt="Logo" class="logo-img">
            <h4 class="fw-bold mb-0" style="color: #333;">CONTROL FRIGORÍFICO</h4>
            <p class="text-muted small mb-0 text-uppercase">Monitoreo de Cámaras</p>
        </div>

        <div class="card-body p-4">
            <form id="formFrigo">
                <div class="mb-3">
                    <label class="form-label">OPERADOR</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                        <input type="text" id="operador" class="form-control" placeholder="Su nombre" required>
                    </div>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-7">
                        <label class="form-label">VARIEDAD</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-tag"></i></span>
                            <select id="variedad" class="form-select" required>
                                <option value="">Seleccionar...</option>
                                <option value="Galas">Galas</option>
                                <option value="Granny">Granny</option>
                                <option value="Fuji">Fuji</option>
                                <option value="Red Delicius">Red Delicius</option>
                                <option value="Cripps Pink">Cripps Pink</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-5">
                        <label class="form-label">CÁMARA</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-door-closed"></i></span>
                            <select id="camara" class="form-select" required>
                                <option value="">N°...</option>
                                <option value="2">2</option><option value="3">3</option>
                                <option value="4">4</option><option value="5">5</option>
                                <option value="6">6</option><option value="7">7</option>
                                <option value="8">8</option><option value="9">9</option>
                                <option value="10">10</option><option value="11">11</option>
                                <option value="12">12</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">T° AMBIENTE (°C)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-thermometer-snow text-primary icon-small"></i></span>
                        <input type="number" id="tAmbiente" class="form-control" step="0.1" placeholder="0.0" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">T° PULPA (°C)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-thermometer-half text-danger icon-small"></i></span>
                        <input type="number" id="tPulpa" class="form-control" step="0.1" placeholder="0.0" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">HUMEDAD RELATIVA (%)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-droplets-fill text-info icon-small"></i></span>
                        <input type="number" id="humedad" class="form-control" placeholder="85 - 95" required>
                    </div>
                </div>

                <div class="mb-4">
                    <input type="file" id="fotoInput" class="d-none" accept="image/*" capture="environment">
                    <label for="fotoInput" class="file-label" id="fileLabel">
                        <i class="bi bi-camera fs-2 d-block mb-1 text-primary"></i>
                        <span id="fileName" class="fw-bold text-uppercase">Tocar para tomar foto</span>
                    </label>
                </div>

                <button type="submit" id="btnEnviar" class="btn btn-primary w-100 btn-save">
                    GUARDAR REGISTRO
                </button>
            </form>
        </div>
    </div>
    
    <div id="mensaje" class="alert alert-primary mt-3 d-none text-center fw-bold rounded-4 shadow-sm">
        ✅ REGISTRO ENVIADO CON ÉXITO
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyuIeIvQuLiaVSwlQInOiRYIT_NvtY5-TUCrnZu-xAFyLA8aYWRP7XaWwVCbVN0L_uSLA/exec";

    window.onload = () => {
        const nombre = localStorage.getItem('nombreOperador');
        if (nombre) document.getElementById('operador').value = nombre;
    };

    document.getElementById('fotoInput').addEventListener('change', function(e) {
        if(e.target.files[0]) {
            document.getElementById('fileName').innerText = "✅ FOTO LISTA";
            document.getElementById('fileLabel').style.backgroundColor = "#e7f1ff";
        }
    });

    document.getElementById('formFrigo').addEventListener('submit', function(e) {
        e.preventDefault();
        localStorage.setItem('nombreOperador', document.getElementById('operador').value);

        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> ENVIANDO...';

        const enviar = (base64) => {
            const datos = {
                origen: "frigorifico",
                operador: document.getElementById('operador').value,
                variedad: document.getElementById('variedad').value,
                camara: document.getElementById('camara').value,
                tAmbiente: document.getElementById('tAmbiente').value,
                tPulpa: document.getElementById('tPulpa').value,
                humedad: document.getElementById('humedad').value,
                foto: base64
            };

            fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
            .then(() => {
                document.getElementById('mensaje').classList.remove('d-none');
                setTimeout(() => { location.reload(); }, 2000);
            })
            .catch(() => {
                alert("Error al enviar");
                btn.disabled = false;
                btn.innerText = "GUARDAR REGISTRO";
            });
        };

        const file = document.getElementById('fotoInput').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => enviar(reader.result);
            reader.readAsDataURL(file);
        } else {
            enviar(null);
        }
    });
</script>
</body>
</html>
