<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Frigorífico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #eef2f7; padding: 15px; font-family: sans-serif; }
        .card { border-radius: 20px; border: none; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-frigo { background: #0d6efd; color: white; padding: 20px; text-align: center; border-radius: 20px 20px 0 0; }
        .temp-input { font-weight: bold; font-size: 1.2rem; text-align: center; }
        .btn-primary { padding: 15px; font-weight: bold; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="card">
        <div class="header-frigo">
            <i class="bi bi-snow2 fs-1"></i>
            <h4 class="mb-0">CONTROL DE CÁMARAS</h4>
            <p class="small mb-0">Sector Frigorífico</p>
        </div>

        <div class="card-body p-4">
            <form id="formFrigo">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">OPERADOR DE TURNO</label>
                    <input type="text" id="operador" class="form-control p-3" placeholder="Nombre" required>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label small fw-bold">CÁMARA 1 (°C)</label>
                        <input type="number" id="c1" class="form-control temp-input" step="0.1" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold">CÁMARA 2 (°C)</label>
                        <input type="number" id="c2" class="form-control temp-input" step="0.1" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold">CÁMARA 3 (°C)</label>
                        <input type="number" id="c3" class="form-control temp-input" step="0.1" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold">CÁMARA 4 (°C)</label>
                        <input type="number" id="c4" class="form-control temp-input" step="0.1" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">FOTO DE TERMÓMETROS / ESTADO</label>
                    <input type="file" id="fotoInput" class="form-control" accept="image/*" capture="environment">
                </div>

                <button type="submit" id="btnEnviar" class="btn btn-primary w-100">
                    <i class="bi bi-check-circle me-2"></i>GUARDAR TEMPERATURAS
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "TU_URL_DE_APPS_SCRIPT";

    document.getElementById('formFrigo').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const fotoFile = document.getElementById('fotoInput').files[0];
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> ENVIANDO...';

        if (fotoFile) {
            const reader = new FileReader();
            reader.onloadend = () => enviar(reader.result);
            reader.readAsDataURL(fotoFile);
        } else {
            enviar(null);
        }
    });

    function enviar(fotoBase64) {
        const datos = {
            origen: "frigorifico", // CLAVE: Esto le dice al Script dónde guardar
            operador: document.getElementById('operador').value,
            c1: document.getElementById('c1').value,
            c2: document.getElementById('c2').value,
            c3: document.getElementById('c3').value,
            c4: document.getElementById('c4').value,
            observaciones: "Registro rutinario",
            foto: fotoBase64
        };

        fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
        .then(() => {
            alert("✅ Registro guardado en hoja Frigorífico");
            document.getElementById('formFrigo').reset();
        })
        .finally(() => {
            document.getElementById('btnEnviar').disabled = false;
            document.getElementById('btnEnviar').innerHTML = '<i class="bi bi-check-circle me-2"></i>GUARDAR TEMPERATURAS';
        });
    }
</script>
</body>
</html>
