<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Cámaras Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-soft: #38bdf8;
            --green-soft: #4ade80;
            --red-soft: #f87171;
            --warning-amber: #fbbf24;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 10px;
        }

        /* --- HEADER --- */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; margin-bottom: 12px;
            background: rgba(30, 41, 59, 0.5); border-radius: 15px;
        }
        .logo-wrapper { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 35px; width: auto; object-fit: contain; }
        .app-title { font-size: 1rem; font-weight: 700; margin: 0; }

        /* --- CUADROS SUPERIORES (CON TODAS LAS PULPAS) --- */
        .interactive-zone { max-width: 1200px; margin: 0 auto; }
        .group-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nav-btn { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); 
            color: white; border-radius: 50%; width: 32px; height: 32px; 
        }

        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; margin-bottom: 15px;
        }

        .cam-card { 
            background: var(--card-bg); border-radius: 18px; padding: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .cam-card.alert-active { 
            border: 2px solid var(--red-soft);
            animation: pulse-border 1.5s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(248, 113, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
        }

        .card-stat-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }
        .card-stat-val { font-size: 1.2rem; font-weight: 700; }

        /* Mini Grilla de Pulpas para los Cuadros */
        .card-pulp-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 4px; margin-top: 8px;
            background: rgba(0,0,0,0.15); padding: 6px; border-radius: 10px;
        }
        .p-dot {
            display: flex; flex-direction: column; align-items: center;
            font-size: 0.65rem; border-radius: 4px; padding: 2px;
            background: rgba(255,255,255,0.03);
        }
        .p-dot-idx { font-size: 0.45rem; color: var(--text-muted); }
        .p-dot-val { font-weight: 700; }

        /* --- LISTADO (MANTENIDO INTACTO) --- */
        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .row-item {
            background: var(--card-bg); border-radius: 16px; padding: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; gap: 10px;
        }
        .row-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .row-stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 8px; }
        .pulp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .p-box {
            background: rgba(15, 23, 42, 0.6); border-radius: 8px;
            padding: 4px 8px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .p-info { display: flex; flex-direction: column; }
        .p-idx { font-size: 0.6rem; color: var(--text-muted); font-weight: 600; }
        .p-val { font-size: 0.9rem; font-weight: 700; }
        .p-obs { font-size: 0.55rem; color: var(--warning-amber); text-align: right; max-width: 60%; line-height: 1; }
        .obs-general { font-size: 0.7rem; background: rgba(56, 189, 248, 0.05); padding: 6px; border-radius: 8px; border-left: 3px solid var(--accent-soft); }

        @media (min-width: 992px) {
            .row-item { flex-direction: row; align-items: center; justify-content: space-between; padding: 10px 20px; }
            .row-header { border: none; padding: 0; min-width: 150px; }
            .row-stats { background: none; min-width: 200px; }
            .pulp-grid { grid-template-columns: repeat(6, 1fr); flex-grow: 1; margin: 0 20px; }
            .p-box { flex-direction: column; text-align: center; justify-content: center; min-height: 55px; }
            .p-obs { text-align: center; max-width: 100%; margin-top: 2px; }
        }

        .badge-v { font-size: 0.7rem; color: var(--accent-soft); background: rgba(56, 189, 248, 0.1); padding: 2px 8px; border-radius: 5px; }
        .v-amb { font-size: 1.1rem; font-weight: 700; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-wrapper">
        <img src="logo-icono.png" alt="Logo" class="logo-img">
        <h1 class="app-title">MONITOR FRIGO</h1>
    </div>
    <div id="reloj" class="sync-info small">00:00:00</div>
</header>

<div class="interactive-zone" id="main-carousel">
    <div class="group-nav">
        <button class="nav-btn" onclick="manualChange(-1)"><i class="bi bi-chevron-left"></i></button>
        <span id="group-label" class="badge bg-primary px-3 py-2">Grupo</span>
        <button class="nav-btn" onclick="manualChange(1)"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div id="cards-container" class="cards-grid"></div>
</div>

<div class="list-container" id="data-list"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwPxKSx5D9v7GZI-Vc3Z_-8mlLlRwqa6Plw3pLc6E0iy3rdtWnSkd2XdkyJ3tU3SO0/exec";
    const BASE_URL = WEB_APP_URL + "?pestana=Frigorifico";
    
    let allData = [];
    let currentGroup = 0;
    let isPaused = false;

    const groups = [
        { label: "Cámaras 2 - 5", ids: ["2", "3", "4", "5"] },
        { label: "Cámaras 6 - 9", ids: ["6", "7", "8", "9"] },
        { label: "Cámaras 10 - 12", ids: ["10", "11", "12"] }
    ];

    document.getElementById('main-carousel').onmouseenter = () => isPaused = true;
    document.getElementById('main-carousel').onmouseleave = () => isPaused = false;

    async function syncData() {
        try {
            const response = await fetch(BASE_URL + "&t=" + new Date().getTime());
            const json = await response.json();
            if (!json || json.length < 2) return;
            const hoyStr = new Date().toLocaleDateString();
            allData = json.slice(1).filter(row => row[0] && new Date(row[0]).toLocaleDateString() === hoyStr);
            drawUI();
        } catch (e) { console.error(e); }
    }

    function drawUI() {
        const listContainer = document.getElementById('data-list');
        const latest = {};
        allData.forEach(row => { latest[row[3]] = row; });
        const sorted = Object.values(latest).sort((a, b) => parseInt(a[3]) - parseInt(b[3]));

        // LISTADO PRINCIPAL (INTACTO)
        listContainer.innerHTML = sorted.map(r => {
            const tAmb = Number(r[4] || 0);
            const hum = Number(r[11] || 0);
            const hora = new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const detalles = r[14] ? r[14].split(' | ') : [];
            const obsGral = r[13] || '';

            let pulpasHtml = "";
            for (let i = 1; i <= 6; i++) {
                const val = Number(r[4 + i] || 0);
                let obsFruto = "";
                if (detalles[i-1]) {
                    const match = detalles[i-1].match(/\(([^)]+)\)/);
                    obsFruto = match ? match[1] : "";
                }
                pulpasHtml += `
                    <div class="p-box">
                        <div class="p-info">
                            <span class="p-idx">P${i}</span>
                            <span class="p-val ${val > 2 ? 'text-danger' : 'text-success'}">${val.toFixed(1)}°</span>
                        </div>
                        ${obsFruto ? `<span class="p-obs">${obsFruto}</span>` : ''}
                    </div>`;
            }

            return `
                <div class="row-item">
                    <div class="row-header">
                        <span class="fw-bold text-primary">CÁMARA ${r[3]}</span>
                        <span class="text-muted" style="font-size:0.7rem">${hora}</span>
                    </div>
                    <div class="row-stats">
                        <div class="text-center">
                            <span class="p-idx d-block">AMBIENTE</span>
                            <span class="v-amb ${tAmb > 1.5 ? 'text-danger' : 'text-success'}">${tAmb.toFixed(1)}°</span>
                        </div>
                        <div class="text-center">
                            <span class="p-idx d-block">HUMEDAD</span>
                            <span class="v-amb ${hum < 85 ? 'text-danger' : 'text-main'}">${hum}%</span>
                        </div>
                        <div class="text-center d-none d-lg-block">
                            <span class="p-idx d-block">VARIEDAD</span>
                            <span class="badge-v">${r[2] || 'S/V'}</span>
                        </div>
                    </div>
                    <div class="pulp-grid">${pulpasHtml}</div>
                    <div class="d-flex flex-column gap-1">
                        <span class="badge-v d-lg-none text-center">${r[2] || 'S/V'}</span>
                        ${obsGral ? `<div class="obs-general"><i class="bi bi-info-circle me-1"></i>${obsGral}</div>` : ''}
                    </div>
                </div>`;
        }).join('');

        renderCards(latest);
    }

    function renderCards(latest) {
        const container = document.getElementById('cards-container');
        const activeGroup = groups[currentGroup];
        document.getElementById('group-label').innerText = activeGroup.label;

        container.innerHTML = activeGroup.ids.map(id => {
            const r = latest[id];
            if(!r) return `<div class="cam-card text-muted small text-center">CAM ${id}<br>OFFLINE</div>`;
            
            const tAmb = Number(r[4] || 0);
            const hum = Number(r[11] || 0);
            
            let pulpasHtml = "";
            let pulseRed = false;
            for (let i = 1; i <= 6; i++) {
                const val = Number(r[4 + i] || 0);
                if(val > 2.0) pulseRed = true;
                pulpasHtml += `
                    <div class="p-dot">
                        <span class="p-dot-idx">P${i}</span>
                        <span class="p-dot-val ${val > 2.0 ? 'text-danger' : 'text-success'}">${val.toFixed(1)}</span>
                    </div>`;
            }
            
            const hasAlert = (tAmb > 1.5 || hum < 85 || pulseRed);

            return `
                <div class="cam-card ${hasAlert ? 'alert-active' : ''}">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="badge bg-primary" style="font-size:0.6rem">CAM ${id}</span>
                        <span class="p-idx" style="font-size:0.5rem">${new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-end">
                        <div>
                            <div class="card-stat-label">Ambiente</div>
                            <div class="card-stat-val ${tAmb > 1.5 ? 'text-danger' : 'text-success'}">${tAmb.toFixed(1)}°</div>
                        </div>
                        <div class="text-end">
                            <div class="card-stat-label">Humedad</div>
                            <div class="card-stat-val ${hum < 85 ? 'text-danger' : 'text-main'}" style="font-size:0.95rem">${hum}%</div>
                        </div>
                    </div>

                    <div class="card-pulp-grid">
                        ${pulpasHtml}
                    </div>
                    
                    <div class="p-idx text-truncate mt-2 text-center" style="color:var(--accent-soft); font-size:0.55rem; border-top:1px solid rgba(255,255,255,0.05); padding-top:3px;">
                        ${r[2] || 'S/V'}
                    </div>
                </div>`;
        }).join('');
    }

    function manualChange(direction) {
        currentGroup = (currentGroup + direction + groups.length) % groups.length;
        const latest = {};
        allData.forEach(row => { latest[row[3]] = row; });
        renderCards(latest);
    }

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(syncData, 60000);
    setInterval(() => { if(!isPaused && allData.length > 0) manualChange(1); }, 8000);
    syncData();
</script>
</body>
</html>
