<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Cámaras</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-soft: #38bdf8;
            --green-soft: #4ade80;
            --red-soft: #f87171;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 15px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
        }

        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 30px; width: auto; }
        .app-title { font-size: 1.1rem; font-weight: 700; margin: 0; }

        .sync-info {
            font-size: 0.65rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 4px 12px;
            border-radius: 50px;
        }

        .group-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 15px;
        }

        .nav-btn { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            border-radius: 50%; 
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .nav-btn:hover { background: var(--accent-soft); color: var(--bg-app); }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .cam-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 24px; 
            padding: 18px; 
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }
        
        .cam-card.alert { 
            border: 1.5px solid var(--red-soft); 
            background: rgba(248, 113, 113, 0.05);
        }

        .label-text { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
        .value-text { font-size: 1.2rem; font-weight: 700; }
        
        .time-tag {
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: auto;
            text-align: right;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 8px;
        }

        .list-section { 
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .table { color: var(--text-main); margin-bottom: 0; background-color: transparent !important; }
        .table thead th { border: none; color: var(--accent-soft); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; background-color: transparent !important; }
        .table tbody td { border-color: rgba(255,255,255,0.05); padding: 12px 8px; font-size: 0.85rem; vertical-align: middle; background-color: transparent !important; }

        .badge-variety {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-soft);
            border: 1px solid rgba(56, 189, 248, 0.1);
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-section">
        <img src="logo-icono.png" alt="Logo" class="logo-img" onerror="this.style.visibility='hidden'">
        <h1 class="app-title">Monitor de Cámaras</h1>
    </div>
    <div class="sync-info">
        <i class="bi bi-clock me-1"></i> <span id="reloj">00:00:00</span>
    </div>
</header>

<div class="cams-section" id="interactive-area">
    <div class="group-nav">
        <button class="nav-btn" onclick="changeGroup(-1)"><i class="bi bi-chevron-left"></i></button>
        <span id="group-label" class="badge rounded-pill bg-dark px-3 py-2" style="font-weight: 500;">Cámaras</span>
        <button class="nav-btn" onclick="changeGroup(1)"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div id="cards-container" class="cards-grid"></div>
</div>

<div class="list-section">
    <div class="table-responsive">
        <table class="table">
            <thead>
                <tr>
                    <th>HORA</th>
                    <th>VARIEDAD</th>
                    <th>CÁMARA</th>
                    <th class="text-center">AMB.</th>
                    <th class="text-center">PULPA</th>
                    <th class="text-center">HUM %</th>
                    <th class="text-center">INFO</th>
                </tr>
            </thead>
            <tbody id="data-table-body"></tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbx5EOR_Tc7oKxQ2vox98DKAUuhqpz-S_q3X47bDDhWBBsL-2RYFdWrjLiC8ptFmTQsZhg/exec?pestana=Frigorifico";
    
    let allData = [];
    let currentGroup = 0;
    let isPaused = false;

    const groups = [
        { label: "Cámaras 2 - 5", ids: ["Cámara 2", "Cámara 3", "Cámara 4", "Cámara 5"] },
        { label: "Cámaras 6 - 9", ids: ["Cámara 6", "Cámara 7", "Cámara 8", "Cámara 9"] },
        { label: "Cámaras 10 - 12", ids: ["Cámara 10", "Cámara 11", "Cámara 12"] }
    ];

    async function syncData() {
        try {
            const response = await fetch(BASE_URL + "&t=" + new Date().getTime());
            const json = await response.json();
            
            // --- FILTRO SOLO HOY ---
            const hoyStr = new Date().toLocaleDateString();

            allData = json.slice(1).filter(row => {
                if (!row[0]) return false;
                return new Date(row[0]).toLocaleDateString() === hoyStr;
            }).reverse();
            
            if (allData.length === 0) {
                document.getElementById('data-table-body').innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4 small">Sin controles registrados hoy</td></tr>';
            } else {
                drawTable();
            }
            drawCards();
        } catch (e) { console.error("Error"); }
    }

    function formatTime(dateString) {
        const fecha = new Date(dateString);
        return isNaN(fecha) ? "--:--" : fecha.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    function drawCards() {
        const container = document.getElementById('cards-container');
        const label = document.getElementById('group-label');
        const latestByCam = {};

        allData.forEach(row => {
            const camName = String(row[3] || ""); 
            if (camName && !latestByCam[camName]) latestByCam[camName] = row;
        });

        const activeGroup = groups[currentGroup];
        label.innerText = activeGroup.label;
        container.innerHTML = "";

        activeGroup.ids.forEach(id => {
            const r = latestByCam[id];
            const div = document.createElement('div');
            div.className = "cam-card";
            
            if(!r) {
                div.innerHTML = `<span class="label-text" style="color:var(--accent-soft)">${id}</span><div class="text-muted small mt-2">Sin datos hoy</div>`;
            } else {
                const [time, op, variedad, cam, tAmb, tPulp, hum] = r;
                const isAlert = (tAmb > 1.5 || tPulp > 2 || hum < 85 || hum > 95);
                if(isAlert) div.classList.add('alert');

                div.innerHTML = `
                    <span class="label-text" style="color:var(--accent-soft)">${cam}</span>
                    <div class="fw-bold text-truncate mb-3" style="font-size:0.8rem;">${variedad}</div>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <p class="label-text">Ambiente</p>
                            <div class="value-text ${tAmb > 1.5 ? 'text-danger' : 'text-success'}">${Number(tAmb).toFixed(1)}°</div>
                        </div>
                        <div class="col-6">
                            <p class="label-text">Pulpa</p>
                            <div class="value-text ${tPulp > 2 ? 'text-danger' : 'text-success'}">${Number(tPulp).toFixed(1)}°</div>
                        </div>
                        <div class="col-12 mt-2">
                            <p class="label-text">Humedad</p>
                            <div class="value-text ${hum < 85 || hum > 95 ? 'text-danger' : 'text-success'}">${Number(hum).toFixed(0)}%</div>
                        </div>
                    </div>
                    <div class="time-tag">Act: ${formatTime(time)}</div>
                `;
            }
            container.appendChild(div);
        });
    }

    function drawTable() {
        const body = document.getElementById('data-table-body');
        body.innerHTML = allData.slice(0, 15).map(r => {
            const hora = formatTime(r[0]);
            
            // Lógica de rangos (igual que en las tarjetas)
            const tAmb = Number(r[4]);
            const tPulp = Number(r[5]);
            const hum = Number(r[6]);

            // Colores basados en reglas técnicas
            const colorAmb = tAmb > 1.5 ? 'text-danger' : 'text-success';
            const colorPulp = tPulp > 2 ? 'text-danger' : 'text-success';
            // Humedad ideal: 85% a 95%. Fuera de eso es alerta.
            const colorHum = (hum < 85 || hum > 95) ? 'text-danger' : 'text-success';

            return `
                <tr>
                    <td class="fw-bold" style="color: var(--accent-soft)">${hora}</td>
                    <td><span class="badge-variety">${r[2]}</span></td>
                    <td class="fw-bold" style="color: var(--text-main)">${r[3]}</td>
                    <td class="text-center fw-bold ${colorAmb}">${tAmb.toFixed(1)}°</td>
                    <td class="text-center fw-bold ${colorPulp}">${tPulp.toFixed(1)}°</td>
                    <td class="text-center fw-bold ${colorHum}">${hum.toFixed(0)}%</td>
                    <td class="text-center">
                        ${r[7] && r[7] !== "Sin foto" ? `<a href="${r[7]}" target="_blank" style="color: var(--accent-soft)"><i class="bi bi-camera-fill"></i></a>` : '-'}
                    </td>
                </tr>
            `;
        }).join('');
    }

    function changeGroup(n) { currentGroup = (currentGroup + n + groups.length) % groups.length; drawCards(); }

    const interactiveArea = document.getElementById('interactive-area');
    interactiveArea.onmouseenter = () => isPaused = true;
    interactiveArea.onmouseleave = () => isPaused = false;

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(syncData, 60000); 
    setInterval(() => { if(!isPaused) changeGroup(1); }, 10000);

    syncData();
</script>
</body>
</html>
