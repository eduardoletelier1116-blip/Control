<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Cámaras Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-soft: #38bdf8;
            --green-soft: #4ade80;
            --red-soft: #f87171;
            --warning-amber: #fbbf24;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 10px;
        }

        /* --- HEADER --- */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; margin-bottom: 12px;
            background: rgba(30, 41, 59, 0.5); border-radius: 15px;
        }
        .logo-img { width: 35px; height: 35px; object-fit: contain; }
        .app-title { font-size: 1rem; font-weight: 700; margin: 0; }

        /* --- CARDS SUPERIORES (Más elegantes) --- */
        .group-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nav-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 50%; width: 32px; height: 32px; font-size: 0.8rem; }

        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px; margin-bottom: 15px;
        }

        .cam-card { 
            background: linear-gradient(145deg, #1e293b, #111827);
            border-radius: 18px; padding: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .cam-card.alert { border: 1px solid var(--red-soft); background: rgba(248, 113, 113, 0.05); }

        /* --- LISTADO INFERIOR (CORREGIDO Y COMPACTO) --- */
        .list-container { display: flex; flex-direction: column; gap: 8px; }
        
        /* En PC se ve como tabla, en móvil como tarjeta compacta */
        .row-item {
            background: var(--card-bg); border-radius: 14px;
            padding: 10px; border: 1px solid rgba(255,255,255,0.05);
            display: grid; grid-template-columns: 1fr 1fr 2fr 1fr; /* Estilo Desktop */
            align-items: center;
        }

        @media (max-width: 768px) {
            .row-item {
                grid-template-columns: 1fr 1fr; /* 2 columnas en móvil */
                grid-template-areas: 
                    "head head"
                    "info pulpas"
                    "obs obs";
                gap: 8px;
            }
            .header-info { grid-area: head; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; display: flex; justify-content: space-between; }
            .main-stats { grid-area: info; display: flex; flex-direction: column; justify-content: center; }
            .pulp-grid { grid-area: pulpas; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
            .obs-box { grid-area: obs; }
            
            /* Ocultar etiquetas de tabla clásica */
            .desktop-only { display: none; }
        }

        @media (min-width: 769px) {
            .list-container { display: block; }
            .row-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
            .pulp-grid { display: flex; gap: 5px; }
            .header-info { min-width: 120px; }
        }

        /* Mini Cajas de Pulpa */
        .p-mini {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 6px; padding: 2px 4px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .p-val { font-size: 0.75rem; font-weight: 700; display: block; }
        .p-idx { font-size: 0.5rem; color: var(--text-muted); display: block; text-transform: uppercase; }

        .badge-variety { font-size: 0.65rem; background: rgba(56, 189, 248, 0.1); color: var(--accent-soft); padding: 1px 6px; border-radius: 4px; }
        .val-big { font-size: 1rem; font-weight: 700; }
        .text-obs { font-size: 0.65rem; color: var(--warning-amber); font-style: italic; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="d-flex align-items-center gap-2">
        <img src="logo-icono.png" alt="Logo" class="logo-img">
        <h1 class="app-title">MONITOR FRIGO</h1>
    </div>
    <div id="reloj" class="sync-info">00:00:00</div>
</header>

<!-- Área de Cards -->
<div class="group-nav">
    <button class="nav-btn" onclick="changeGroup(-1)"><i class="bi bi-chevron-left"></i></button>
    <span id="group-label" class="badge bg-dark">Cámaras</span>
    <button class="nav-btn" onclick="changeGroup(1)"><i class="bi bi-chevron-right"></i></button>
</div>
<div id="cards-container" class="cards-grid"></div>

<!-- Listado Compacto -->
<div class="list-container" id="data-list">
    <!-- Las filas se insertan aquí -->
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwPxKSx5D9v7GZI-Vc3Z_-8mlLlRwqa6Plw3pLc6E0iy3rdtWnSkd2XdkyJ3tU3SO0/exec";
    const BASE_URL = WEB_APP_URL + "?pestana=Frigorifico";
    
    let allData = [];
    let currentGroup = 0;
    const groups = [
        { label: "Cámaras 2 - 5", ids: ["2", "3", "4", "5"] },
        { label: "Cámaras 6 - 9", ids: ["6", "7", "8", "9"] },
        { label: "Cámaras 10 - 12", ids: ["10", "11", "12"] }
    ];

    async function syncData() {
        try {
            const response = await fetch(BASE_URL + "&t=" + new Date().getTime());
            const json = await response.json();
            if (!json || json.length < 2) return;
            
            const hoyStr = new Date().toLocaleDateString();
            allData = json.slice(1).filter(row => row[0] && new Date(row[0]).toLocaleDateString() === hoyStr);
            
            drawUI();
        } catch (e) { console.error(e); }
    }

    function drawUI() {
        const listContainer = document.getElementById('data-list');
        const cardsContainer = document.getElementById('cards-container');
        const latest = {};
        allData.forEach(row => { latest[row[3]] = row; });
        const sorted = Object.values(latest).sort((a, b) => parseInt(a[3]) - parseInt(b[3]));

        // DIBUJAR LISTADO COMPACTO
        listContainer.innerHTML = sorted.map(r => {
            const tAmb = Number(r[4] || 0);
            const hum = Number(r[11] || 0);
            const hora = new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const detalles = r[14] ? r[14].split(' | ') : [];
            const obsGral = r[13] || '';

            let pulpasHtml = "";
            for (let i = 1; i <= 6; i++) {
                const val = Number(r[4 + i] || 0);
                pulpasHtml += `
                    <div class="p-mini">
                        <span class="p-idx">P${i}</span>
                        <span class="p-val ${val > 2 ? 'text-danger' : 'text-success'}">${val.toFixed(1)}</span>
                    </div>`;
            }

            return `
                <div class="row-item">
                    <div class="header-info">
                        <span class="fw-bold text-primary">CAM ${r[3]}</span>
                        <span class="text-muted small">${hora}</span>
                    </div>
                    <div class="main-stats">
                        <span class="badge-variety mb-1">${r[2] || 'S/V'}</span>
                        <div>
                            <span class="val-big ${tAmb > 1.5 ? 'text-danger' : 'text-success'}">${tAmb.toFixed(1)}°</span>
                            <span class="ms-2 val-big">${hum}% <i class="bi bi-droplets small"></i></span>
                        </div>
                    </div>
                    <div class="pulp-grid">${pulpasHtml}</div>
                    ${obsGral ? `<div class="obs-box text-obs"><i class="bi bi-chat-dots me-1"></i>${obsGral}</div>` : ''}
                </div>`;
        }).join('');

        // DIBUJAR CARDS SUPERIORES
        const activeGroup = groups[currentGroup];
        document.getElementById('group-label').innerText = activeGroup.label;
        cardsContainer.innerHTML = activeGroup.ids.map(id => {
            const r = latest[id];
            if(!r) return `<div class="cam-card text-muted small">CAM ${id}<br>Sin datos</div>`;
            const tAmb = Number(r[4] || 0);
            return `
                <div class="cam-card ${tAmb > 1.5 ? 'alert' : ''}">
                    <div class="d-flex justify-content-between">
                        <span class="label-text">CAM ${id}</span>
                        <span class="label-text">${new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="val-big mt-1">${tAmb.toFixed(1)}°</div>
                    <div class="badge-variety mt-1 text-truncate">${r[2] || 'S/V'}</div>
                </div>`;
        }).join('');
    }

    function changeGroup(n) { currentGroup = (currentGroup + n + groups.length) % groups.length; drawUI(); }
    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(syncData, 60000);
    setInterval(() => changeGroup(1), 10000);
    syncData();
</script>
</body>
</html>
