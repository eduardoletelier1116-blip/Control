<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Frigorífico - Control Central</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
        }
        body { 
            background-color: var(--bg-app); 
            color: #e2e8f0; 
            font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        .header-monitor { 
            background: var(--card-bg); 
            padding: 10px 20px; 
            border-bottom: 2px solid #334155; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        /* Sección de Tarjetas */
        .cams-section { 
            padding: 20px 10px;
            background: rgba(30, 41, 59, 0.2);
            position: relative;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .cam-card { 
            background: var(--card-bg); 
            border: 1px solid #475569; 
            border-radius: 16px; 
            padding: 15px; 
            position: relative;
            transition: transform 0.2s;
        }
        .cam-card.alert { 
            border: 2px solid #ef4444; 
            background: #2d1a1a; 
            animation: pulse 2s infinite; 
        }
        /* Tabla */
        .list-section { 
            flex-grow: 1; 
            padding: 15px; 
            background: #020617;
        }
        .table { font-size: 0.8rem; }
        .table thead th { 
            background: #1e293b; 
            color: var(--accent);
            border: none;
            white-space: nowrap;
        }
        .label-text { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 0; }
        .value-text { font-size: 1.1rem; font-weight: bold; }
        
        .nav-btn { 
            background: var(--card-bg); 
            border: 1px solid var(--accent); 
            color: white; 
            border-radius: 50%; 
            width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center;
        }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

<div class="header-monitor">
    <h6 class="mb-0 fw-bold">CONTROL <span class="text-info">FRIGORÍFICO</span></h6>
    <div id="reloj" class="small fw-bold text-info">00:00:00</div>
</div>

<div class="cams-section">
    <div class="d-flex justify-content-between align-items-center mb-3 max-width-1200 mx-auto px-2">
        <button class="nav-btn" onclick="changeGroup(-1)"><i class="bi bi-chevron-left"></i></button>
        <span id="group-label" class="badge bg-dark">Cámaras 2 - 5</span>
        <button class="nav-btn" onclick="changeGroup(1)"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div id="cards-container" class="cards-grid"></div>
</div>

<div class="list-section">
    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>HORA</th>
                    <th>VARIEDAD</th>
                    <th>CÁM</th>
                    <th class="text-center">AMB</th>
                    <th class="text-center">PULPA</th>
                    <th class="text-center">HUM %</th>
                    <th class="text-center">FOTO</th>
                </tr>
            </thead>
            <tbody id="data-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbx5EOR_Tc7oKxQ2vox98DKAUuhqpz-S_q3X47bDDhWBBsL-2RYFdWrjLiC8ptFmTQsZhg/exec?pestana=Frigorifico";
    
    let allData = [];
    let currentGroup = 0;
    const groups = [
        { label: "Cámaras 2 - 5", ids: ["Cámara 2", "Cámara 3", "Cámara 4", "Cámara 5"] },
        { label: "Cámaras 6 - 9", ids: ["Cámara 6", "Cámara 7", "Cámara 8", "Cámara 9"] },
        { label: "Cámaras 10 - 12", ids: ["Cámara 10", "Cámara 11", "Cámara 12"] }
    ];

    async function syncData() {
        try {
            const response = await fetch(BASE_URL + "&t=" + new Date().getTime());
            const json = await response.json();
            // Invertimos para tener lo más reciente arriba
            allData = json.slice(1).reverse();
            
            drawTable();
            drawCards();
        } catch (e) { console.error("Error de conexión"); }
    }

    function drawCards() {
        const container = document.getElementById('cards-container');
        const label = document.getElementById('group-label');
        const latestByCam = {};

        // Mapeo basado en tus columnas: [0]Time, [1]Op, [2]Var, [3]Cam, [4]Amb, [5]Pulp, [6]Hum, [7]Foto
        allData.forEach(row => {
            const camName = String(row[3] || ""); 
            if (camName && !latestByCam[camName]) {
                latestByCam[camName] = row;
            }
        });

        const activeGroup = groups[currentGroup];
        label.innerText = activeGroup.label;
        container.innerHTML = "";

        activeGroup.ids.forEach(id => {
            const r = latestByCam[id];
            const div = document.createElement('div');
            div.className = "cam-card";
            
            if(!r) {
                div.innerHTML = `<p class="label-text">${id}</p><div class="text-muted small">Sin datos</div>`;
            } else {
                const [time, op, variedad, cam, tAmb, tPulp, hum] = r;
                const isAlert = (tAmb > 1.5 || tPulp > 2 || hum < 85 || hum > 95);
                if(isAlert) div.classList.add('alert');

                div.innerHTML = `
                    <p class="label-text" style="color:var(--accent)">${cam}</p>
                    <div class="fw-bold text-truncate mb-2" style="font-size:0.75rem;">${variedad}</div>
                    <div class="row g-1">
                        <div class="col-6">
                            <p class="label-text">Amb</p>
                            <div class="value-text ${tAmb > 1.5 ? 'text-danger' : 'text-success'}">${tAmb}°</div>
                        </div>
                        <div class="col-6">
                            <p class="label-text">Pulp</p>
                            <div class="value-text ${tPulp > 2 ? 'text-danger' : 'text-success'}">${tPulp}°</div>
                        </div>
                        <div class="col-12 mt-1">
                            <p class="label-text">Hum</p>
                            <div class="value-text ${hum < 85 || hum > 95 ? 'text-danger' : 'text-success'}">${hum}%</div>
                        </div>
                    </div>
                `;
            }
            container.appendChild(div);
        });
    }

    function drawTable() {
        const body = document.getElementById('data-table-body');
        body.innerHTML = allData.slice(0, 15).map(r => {
            // r[0]:Time, r[1]:Op, r[2]:Var, r[3]:Cam, r[4]:Amb, r[5]:Pulp, r[6]:Hum, r[7]:Foto
            const fecha = new Date(r[0]);
            const hora = isNaN(fecha) ? "---" : fecha.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            return `
                <tr>
                    <td class="text-info">${hora}</td>
                    <td class="text-truncate" style="max-width: 100px;">${r[2]}</td>
                    <td>${r[3]}</td>
                    <td class="text-center ${r[4]>1.5?'text-danger':'text-success'}">${r[4]}°</td>
                    <td class="text-center ${r[5]>2?'text-danger':'text-success'}">${r[5]}°</td>
                    <td class="text-center ${r[6]<85?'text-danger':'text-success'}">${r[6]}%</td>
                    <td class="text-center">
                        ${r[7] && r[7] !== "Sin foto" ? `<a href="${r[7]}" target="_blank" class="text-primary"><i class="bi bi-camera"></i></a>` : '-'}
                    </td>
                </tr>
            `;
        }).join('');
    }

    function changeGroup(n) {
        currentGroup = (currentGroup + n + groups.length) % groups.length;
        drawCards();
    }

    // Reloj y Sincronización
    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(syncData, 60000); // Sincroniza cada 1 minuto
    setInterval(() => { changeGroup(1); }, 10000); // Rota tarjetas cada 10 seg

    syncData();
</script>
</body>
</html>
