<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Cámaras Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-soft: #38bdf8;
            --green-soft: #4ade80;
            --red-soft: #f87171;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 15px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
        }

        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 30px; width: auto; }
        .app-title { font-size: 1.1rem; font-weight: 700; margin: 0; }

        .sync-info {
            font-size: 0.65rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 4px 12px;
            border-radius: 50px;
        }

        .group-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 15px;
        }

        .nav-btn { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            border-radius: 50%; 
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .nav-btn:hover { background: var(--accent-soft); color: var(--bg-app); }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .cam-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 24px; 
            padding: 18px; 
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-height: 220px;
            display: flex;
            flex-direction: column;
        }
        
        .cam-card.alert { 
            border: 1.5px solid var(--red-soft); 
            background: rgba(248, 113, 113, 0.05);
            animation: pulse-alert 2s infinite;
        }

        @keyframes pulse-alert {
            0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(248, 113, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
        }

        .label-text { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
        .value-text { font-size: 1.2rem; font-weight: 700; }
        
        .pulp-detail { font-size: 0.6rem; color: var(--text-muted); margin-top: 5px; line-height: 1.2; }

        .time-tag {
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: auto;
            text-align: right;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 8px;
        }

        .list-section { 
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .table { color: var(--text-main); margin-bottom: 0; background-color: transparent !important; }
        .table thead th { border: none; color: var(--accent-soft); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .table tbody td { border-color: rgba(255,255,255,0.05); padding: 12px 8px; font-size: 0.8rem; vertical-align: middle; }

        .badge-variety {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-soft);
            border: 1px solid rgba(56, 189, 248, 0.1);
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-section">
        <img src="logo-icono.png" alt="Logo" class="logo-img" onerror="this.style.visibility='hidden'">
        <h1 class="app-title">Monitor de Cámaras</h1>
    </div>
    <div class="sync-info">
        <i class="bi bi-clock me-1"></i> <span id="reloj">00:00:00</span>
    </div>
</header>

<div class="cams-section" id="interactive-area">
    <div class="group-nav">
        <button class="nav-btn" onclick="changeGroup(-1)"><i class="bi bi-chevron-left"></i></button>
        <span id="group-label" class="badge rounded-pill bg-dark px-3 py-2" style="font-weight: 500;">Cámaras</span>
        <button class="nav-btn" onclick="changeGroup(1)"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div id="cards-container" class="cards-grid"></div>
</div>

<div class="list-section">
    <div class="table-responsive">
        <table class="table">
            <thead>
                <tr>
                    <th>HORA</th>
                    <th>VARIEDAD</th>
                    <th>CAM</th>
                    <th class="text-center">AMB.</th>
                    <th class="text-center">PROM. PULPA</th>
                    <th class="text-center">HUM %</th>
                    <th>OBSERVACIÓN</th>
                    <th class="text-center">FOTO</th>
                </tr>
            </thead>
            <tbody id="data-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxWr-OYFzfjzwGOZzYkMAfyI-yShxOrd6qtpK_PGgSr5teU7AgeVL1pOEkH5F9zRhlUdw/exec?pestana=Frigorifico";
    
    let allData = [];
    let currentGroup = 0;
    let isPaused = false;

    const groups = [
        { label: "Cámaras 2 - 5", ids: ["2", "3", "4", "5"] },
        { label: "Cámaras 6 - 9", ids: ["6", "7", "8", "9"] },
        { label: "Cámaras 10 - 12", ids: ["10", "11", "12"] }
    ];

    async function syncData() {
        try {
            const response = await fetch(BASE_URL + "&t=" + new Date().getTime());
            const json = await response.json();
            const hoyStr = new Date().toLocaleDateString();

            allData = json.slice(1).filter(row => {
                if (!row[0]) return false;
                return new Date(row[0]).toLocaleDateString() === hoyStr;
            }).reverse();
            
            if (allData.length === 0) {
                document.getElementById('data-table-body').innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4 small">Sin controles registrados hoy</td></tr>';
            } else {
                drawTable();
            }
            drawCards();
        } catch (e) { console.error("Error de sincronización"); }
    }

    function drawCards() {
        const container = document.getElementById('cards-container');
        const label = document.getElementById('group-label');
        const latestByCam = {};

        allData.forEach(row => {
            const camId = String(row[3] || ""); 
            if (camId && !latestByCam[camId]) latestByCam[camId] = row;
        });

        const activeGroup = groups[currentGroup];
        label.innerText = activeGroup.label;
        container.innerHTML = "";

        activeGroup.ids.forEach(id => {
            const r = latestByCam[id];
            const div = document.createElement('div');
            div.className = "cam-card";
            
            if(!r) {
                div.innerHTML = `<span class="label-text" style="color:var(--accent-soft)">Cámara ${id}</span><div class="text-muted small mt-2">Sin datos hoy</div>`;
            } else {
                const tAmb = Number(r[4]);
                const pulpas = [r[5], r[6], r[7], r[8], r[9], r[10]].map(Number);
                const tPulpProm = (pulpas.reduce((a, b) => a + b, 0) / 6).toFixed(1);
                const hum = Number(r[11]);
                
                // Alerta si el ambiente es alto O si CUALQUIERA de las pulpas es alta
                const hayAlertaPulpas = pulpas.some(p => p > 2);
                const isAlert = (tAmb > 1.5 || hayAlertaPulpas || hum < 85 || hum > 95);
                
                if(isAlert) div.classList.add('alert');

                div.innerHTML = `
                    <span class="label-text" style="color:var(--accent-soft)">Cámara ${id}</span>
                    <div class="fw-bold text-truncate mb-2" style="font-size:0.75rem;">${r[2]}</div>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <p class="label-text">Ambiente</p>
                            <div class="value-text ${tAmb > 1.5 ? 'text-danger' : 'text-success'}">${tAmb.toFixed(1)}°</div>
                        </div>
                        <div class="col-6">
                            <p class="label-text">Prom. Pulpa</p>
                            <div class="value-text ${hayAlertaPulpas ? 'text-danger' : 'text-success'}">${tPulpProm}°</div>
                        </div>
                    </div>
                    <div class="pulp-detail">
                        P1:${pulpas[0]}° P2:${pulpas[1]}° P3:${pulpas[2]}°<br>
                        P4:${pulpas[3]}° P5:${pulpas[4]}° P6:${pulpas[5]}°
                    </div>
                    <div class="mt-2">
                        <p class="label-text">Humedad</p>
                        <div class="value-text ${hum < 85 || hum > 95 ? 'text-danger' : 'text-success'}">${hum.toFixed(0)}%</div>
                    </div>
                    <div class="time-tag">${new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                `;
            }
            container.appendChild(div);
        });
    }

    function drawTable() {
        const body = document.getElementById('data-table-body');
        body.innerHTML = allData.slice(0, 15).map(r => {
            const pulpas = [r[5], r[6], r[7], r[8], r[9], r[10]].map(Number);
            const tPulpProm = (pulpas.reduce((a, b) => a + b, 0) / 6);
            const tAmb = Number(r[4]);
            const hum = Number(r[11]);

            return `
                <tr>
                    <td class="fw-bold" style="color: var(--accent-soft)">${new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                    <td><span class="badge-variety">${r[2]}</span></td>
                    <td class="fw-bold">${r[3]}</td>
                    <td class="text-center fw-bold ${tAmb > 1.5 ? 'text-danger' : 'text-success'}">${tAmb.toFixed(1)}°</td>
                    <td class="text-center fw-bold ${pulpas.some(p => p > 2) ? 'text-danger' : 'text-success'}">${tPulpProm.toFixed(1)}°</td>
                    <td class="text-center fw-bold ${(hum < 85 || hum > 95) ? 'text-danger' : 'text-success'}">${hum.toFixed(0)}%</td>
                    <td class="small text-muted">${r[13] || '-'}</td>
                    <td class="text-center">
                        ${r[12] && r[12] !== "Sin foto" ? `<a href="${r[12]}" target="_blank" style="color: var(--accent-soft)"><i class="bi bi-camera-fill"></i></a>` : '-'}
                    </td>
                </tr>
            `;
        }).join('');
    }

    function changeGroup(n) { currentGroup = (currentGroup + n + groups.length) % groups.length; drawCards(); }
    
    const interactiveArea = document.getElementById('interactive-area');
    interactiveArea.onmouseenter = () => isPaused = true;
    interactiveArea.onmouseleave = () => isPaused = false;

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(syncData, 60000); 
    setInterval(() => { if(!isPaused) changeGroup(1); }, 10000);

    syncData();
</script>
</body>
</html>
