<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Cámaras Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-soft: #38bdf8;
            --green-soft: #4ade80;
            --red-soft: #f87171;
            --warning-amber: #fbbf24;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 5px;
        }

        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; margin-bottom: 10px;
            background: rgba(30, 41, 59, 0.5); border-radius: 15px;
        }

        .app-title { font-size: 1rem; font-weight: 700; margin: 0; }

        .group-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .cam-card { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 12px; min-height: 180px;
        }

        /* TABLA COMPACTA */
        .list-section { 
            background: var(--card-bg); border-radius: 15px;
            padding: 10px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.05);
        }

        .table { color: var(--text-main) !important; margin-bottom: 0; }
        .table thead th { 
            border: none; color: var(--accent-soft); font-size: 0.65rem; 
            padding: 5px !important; text-transform: uppercase;
        }
        .table tbody td { 
            border-color: rgba(255,255,255,0.05) !important; 
            padding: 4px 8px !important; /* Espacios mínimos */
            font-size: 0.75rem; vertical-align: middle; 
            background-color: transparent !important;
        }

        .pulp-container { display: flex; justify-content: center; gap: 4px; }
        .pulp-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2px 5px; border-radius: 6px;
            min-width: 55px; text-align: center;
        }

        .obs-tag {
            display: block; font-size: 0.55rem; color: var(--warning-amber);
            line-height: 1; margin-top: 1px; font-weight: 500;
        }

        .hum-value { color: #ffffff; font-weight: 700; } /* Humedad en blanco resaltado */
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-section"><h1 class="app-title">Monitor de Cámaras</h1></div>
    <div class="sync-info" id="reloj">00:00:00</div>
</header>

<div id="interactive-area">
    <div class="group-nav">
        <button class="nav-btn btn btn-sm btn-outline-light rounded-circle" onclick="changeGroup(-1)"><</button>
        <span id="group-label" class="badge bg-dark">Cámaras</span>
        <button class="nav-btn btn btn-sm btn-outline-light rounded-circle" onclick="changeGroup(1)">></button>
    </div>
    <div id="cards-container" class="cards-grid"></div>
</div>

<div class="list-section">
    <div class="table-responsive">
        <table class="table">
            <thead>
                <tr>
                    <th>CAM</th>
                    <th>HORA</th>
                    <th>VARIEDAD</th>
                    <th class="text-center">AMB.</th>
                    <th class="text-center">PULPAS (P1-P6)</th>
                    <th class="text-center">HUM%</th>
                    <th class="text-center">FOTO</th>
                </tr>
            </thead>
            <tbody id="data-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwPxKSx5D9v7GZI-Vc3Z_-8mlLlRwqa6Plw3pLc6E0iy3rdtWnSkd2XdkyJ3tU3SO0/exec";
    const BASE_URL = WEB_APP_URL + "?pestana=Frigorifico";
    
    let allData = [];
    let currentGroup = 0;

    const groups = [
        { label: "Cámaras 2 - 5", ids: ["2", "3", "4", "5"] },
        { label: "Cámaras 6 - 9", ids: ["6", "7", "8", "9"] },
        { label: "Cámaras 10 - 12", ids: ["10", "11", "12"] }
    ];

    async function syncData() {
        try {
            const response = await fetch(BASE_URL + "&t=" + new Date().getTime());
            const json = await response.json();
            if (!json || json.length < 2) return;

            const hoyStr = new Date().toLocaleDateString();
            allData = json.slice(1).filter(row => {
                if (!row[0]) return false;
                return new Date(row[0]).toLocaleDateString() === hoyStr;
            }); // Ya no invertimos aquí para poder ordenar después

            drawTable();
            drawCards();
        } catch (e) { console.error(e); }
    }

    function drawTable() {
        const body = document.getElementById('data-table-body');
        
        // --- LÓGICA DE ORDENADO POR CÁMARA ---
        // Obtenemos solo el último registro de cada cámara para la tabla
        const latestEntries = {};
        allData.forEach(row => {
            const camId = parseInt(row[3]);
            latestEntries[camId] = row; 
        });

        const sortedCams = Object.values(latestEntries).sort((a, b) => parseInt(a[3]) - parseInt(b[3]));

        body.innerHTML = sortedCams.map(r => {
            const hora = new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const tAmb = Number(r[4] || 0);
            const hum = Number(r[11] || 0);
            const obsGral = r[13] || '';
            const detalles = r[14] ? r[14].split(' | ') : [];

            let pulpasHtml = "";
            for (let i = 1; i <= 6; i++) {
                const val = Number(r[4 + i] || 0);
                let obsFruto = "";
                if (detalles[i-1]) {
                    const match = detalles[i-1].match(/\(([^)]+)\)/);
                    obsFruto = match ? match[1] : "";
                }
                pulpasHtml += `
                    <div class="pulp-box">
                        <span style="font-size:0.5rem; color:var(--text-muted); display:block;">P${i}</span>
                        <span class="fw-bold ${val > 2 ? 'text-danger' : 'text-success'}">${val.toFixed(1)}°</span>
                        ${obsFruto ? `<span class="obs-tag">${obsFruto}</span>` : ''}
                    </div>`;
            }

            return `
                <tr>
                    <td class="fw-bold text-info" style="font-size:1rem;">${r[3]}</td>
                    <td class="text-muted">${hora}</td>
                    <td><span class="badge-variety">${r[2] || 'S/V'}</span></td>
                    <td class="text-center fw-bold ${tAmb > 1.5 ? 'text-danger' : 'text-success'}">${tAmb.toFixed(1)}°</td>
                    <td>
                        <div class="pulp-container">${pulpasHtml}</div>
                        ${obsGral ? `<div style="font-size:0.6rem; color:#aaa; margin-top:2px;">${obsGral}</div>` : ''}
                    </td>
                    <td class="text-center"><span class="hum-value">${hum}%</span></td>
                    <td class="text-center">
                        ${r[12] && r[12].startsWith('http') ? `<a href="${r[12]}" target="_blank" class="text-info"><i class="bi bi-camera"></i></a>` : '-'}
                    </td>
                </tr>`;
        }).join('');
    }

    function drawCards() {
        const container = document.getElementById('cards-container');
        const latestByCam = {};
        allData.forEach(row => { latestByCam[row[3]] = row; });

        const activeGroup = groups[currentGroup];
        document.getElementById('group-label').innerText = activeGroup.label;
        container.innerHTML = "";

        activeGroup.ids.forEach(id => {
            const r = latestByCam[id];
            const div = document.createElement('div');
            div.className = "cam-card";
            if(!r) {
                div.innerHTML = `<span class="label-text">Cámara ${id}</span><div class="text-muted small">Sin datos</div>`;
            } else {
                const tAmb = Number(r[4] || 0);
                const pulpas = [r[5], r[6], r[7], r[8], r[9], r[10]].map(v => Number(v || 0));
                div.innerHTML = `
                    <span class="label-text">Cámara ${id}</span>
                    <div class="fw-bold small">${r[2] || 'S/V'}</div>
                    <div class="d-flex justify-content-between mt-2">
                        <div><p class="label-text">Amb.</p><b class="${tAmb > 1.5 ? 'text-danger' : 'text-success'}">${tAmb.toFixed(1)}°</b></div>
                        <div><p class="label-text">Hum.</p><b>${r[11]}%</b></div>
                    </div>
                    <div class="pulp-detail mt-2">P1:${pulpas[0]} P2:${pulpas[1]} P3:${pulpas[2]}...</div>
                    <div class="time-tag">${new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                `;
            }
            container.appendChild(div);
        });
    }

    function changeGroup(n) { currentGroup = (currentGroup + n + groups.length) % groups.length; drawCards(); }
    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(syncData, 60000);
    syncData();
</script>
</body>
</html>
