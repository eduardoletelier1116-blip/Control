<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Frío Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-soft: #38bdf8;
            --green-soft: #4ade80;
            --red-soft: #f87171;
            --warning-amber: #fbbf24;
        }

        body { background-color: var(--bg-app); color: var(--text-main); font-family: 'Poppins', sans-serif; margin: 0; padding: 10px; }

        /* --- HEADER --- */
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; margin-bottom: 12px; background: rgba(30, 41, 59, 0.5); border-radius: 15px; }
        .logo-wrapper { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 35px; width: auto; object-fit: contain; }
        .app-title { font-size: 1rem; font-weight: 700; margin: 0; text-transform: uppercase; }

        /* --- CUADROS SUPERIORES --- */
        .interactive-zone { max-width: 1200px; margin: 0 auto; }
        .group-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nav-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 50%; width: 32px; height: 32px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(185px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .cam-card { background: var(--card-bg); border-radius: 18px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .cam-card.alert-active { border: 2px solid var(--red-soft); animation: pulse-border 1.5s infinite; }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(248, 113, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
        }

        .card-stat-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }
        .card-stat-val { font-size: 1.2rem; font-weight: 700; }
        .card-pulp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 8px; background: rgba(0,0,0,0.15); padding: 6px; border-radius: 10px; }
        .p-dot { display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; border-radius: 4px; padding: 2px; background: rgba(255,255,255,0.03); }
        .p-dot-idx { font-size: 0.45rem; color: var(--text-muted); }
        .p-dot-val { font-weight: 700; }

        /* --- LISTADO --- */
        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .row-item { background: var(--card-bg); border-radius: 16px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px; position: relative; }
        .row-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .row-stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 8px; }
        .pulp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .p-box { background: rgba(15, 23, 42, 0.6); border-radius: 8px; padding: 4px 8px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .p-info { display: flex; flex-direction: column; }
        .p-idx { font-size: 0.6rem; color: var(--text-muted); font-weight: 600; }
        .p-val { font-size: 0.9rem; font-weight: 700; }
        .p-obs { font-size: 0.55rem; color: var(--warning-amber); text-align: right; max-width: 60%; line-height: 1; }
        .obs-general { font-size: 0.7rem; background: rgba(56, 189, 248, 0.05); padding: 6px; border-radius: 8px; border-left: 3px solid var(--accent-soft); }
        .btn-photo { background: var(--accent-soft); color: var(--bg-app); border: none; border-radius: 8px; padding: 8px 12px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-photo:hover { background: #fff; transform: scale(1.05); }
        .btn-photo.disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        @media (min-width: 992px) {
            .row-item { flex-direction: row; align-items: center; justify-content: space-between; padding: 10px 20px; }
            .row-header { border: none; padding: 0; min-width: 140px; }
            .row-stats { background: none; min-width: 250px; gap: 25px; justify-content: flex-start; padding-left: 20px; }
            .pulp-grid { grid-template-columns: repeat(6, 1fr); flex-grow: 1; margin: 0 20px; }
            .p-box { flex-direction: column; text-align: center; justify-content: center; min-height: 55px; }
            .p-obs { text-align: center; max-width: 100%; margin-top: 2px; }
            .photo-col { min-width: 50px; text-align: right; }
        }
        .badge-v { font-size: 0.7rem; color: var(--accent-soft); background: rgba(56, 189, 248, 0.1); padding: 2px 8px; border-radius: 5px; }
        .v-amb { font-size: 1.1rem; font-weight: 700; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-wrapper">
        <img src="logo-icono.png" alt="Logo" class="logo-img">
        <h1 class="app-title">MONITOR FRÍO</h1>
    </div>
    <div id="reloj" class="sync-info small">00:00:00</div>
</header>

<div class="interactive-zone" id="main-carousel">
    <div class="group-nav">
        <button class="nav-btn" onclick="manualChange(-1)"><i class="bi bi-chevron-left"></i></button>
        <span id="group-label" class="badge bg-primary px-3 py-2">Grupo</span>
        <button class="nav-btn" onclick="manualChange(1)"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div id="cards-container" class="cards-grid"></div>
</div>

<div class="list-container" id="data-list"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwPxKSx5D9v7GZI-Vc3Z_-8mlLlRwqa6Plw3pLc6E0iy3rdtWnSkd2XdkyJ3tU3SO0/exec";
    const BASE_URL = WEB_APP_URL + "?pestana=Frigorifico";
    
    let allData = [];
    let currentGroup = 0;
    let isPaused = false;

    const groups = [
        { label: "Cámaras 2 - 5", ids: ["2", "3", "4", "5"] },
        { label: "Cámaras 6 - 9", ids: ["6", "7", "8", "9"] },
        { label: "Cámaras 10 - 12", ids: ["10", "11", "12"] }
    ];

    // --- FUNCIÓN DE RANGOS INTELIGENTES ---
    function getLimits(variedad) {
        const v = variedad ? variedad.toLowerCase() : "";
        
        // Grupo Galas, Fuji, Red Delicius
        if (v.includes("gala") || v.includes("fuji") || v.includes("red delicius") || v.includes("red del")) {
            return { ambMin: -1, ambMax: 0, pulpMin: -0.5, pulpMax: 0.5 };
        }
        // Grupo Granny Smith y Cripps Pink
        if (v.includes("granny") || v.includes("cripps") || v.includes("pink")) {
            return { ambMin: 0, ambMax: 1, pulpMin: 1, pulpMax: 2 };
        }
        // Rango por defecto (Seguridad)
        return { ambMin: -1, ambMax: 1.5, pulpMin: -0.5, pulpMax: 2.0 };
    }

    function checkAlert(val, min, max) {
        return val < min || val > max;
    }

    document.getElementById('main-carousel').onmouseenter = () => isPaused = true;
    document.getElementById('main-carousel').onmouseleave = () => isPaused = false;

    async function syncData() {
        try {
            const response = await fetch(BASE_URL + "&t=" + new Date().getTime());
            const json = await response.json();
            if (!json || json.length < 2) return;
            const hoyStr = new Date().toLocaleDateString();
            allData = json.slice(1).filter(row => row[0] && new Date(row[0]).toLocaleDateString() === hoyStr);
            drawUI();
        } catch (e) { console.error(e); }
    }

    function drawUI() {
        const listContainer = document.getElementById('data-list');
        const latest = {};
        const historySorted = [...allData].sort((a, b) => new Date(b[0]) - new Date(a[0]));

        listContainer.innerHTML = historySorted.map(r => {
            const variedad = r[2];
            const limits = getLimits(variedad);
            const tAmb = Number(r[4] || 0);
            const hum = Number(r[11] || 0);
            const hora = new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const detalles = r[14] ? r[14].split(' | ') : [];
            const linkFoto = r[15];

            let pulpasHtml = "";
            for (let i = 1; i <= 6; i++) {
                const val = Number(r[4 + i] || 0);
                const isPulpAlert = checkAlert(val, limits.pulpMin, limits.pulpMax);
                let obsFruto = "";
                if (detalles[i-1]) {
                    const match = detalles[i-1].match(/\(([^)]+)\)/);
                    obsFruto = match ? match[1] : "";
                }
                pulpasHtml += `<div class="p-box"><div class="p-info"><span class="p-idx">P${i}</span><span class="p-val ${isPulpAlert ? 'text-danger' : 'text-success'}">${val.toFixed(1)}°</span></div>${obsFruto ? `<span class="p-obs">${obsFruto}</span>` : ''}</div>`;
            }

            const isAmbAlert = checkAlert(tAmb, limits.ambMin, limits.ambMax);
            const isHumAlert = hum < 85 || hum > 95;

            return `
                <div class="row-item">
                    <div class="row-header"><span class="fw-bold text-primary">CÁMARA ${r[3]}</span><span class="text-muted" style="font-size:0.7rem">${hora}</span></div>
                    <div class="row-stats">
                        <div class="text-center"><span class="p-idx d-block">AMBIENTE</span><span class="v-amb ${isAmbAlert ? 'text-danger' : 'text-success'}">${tAmb.toFixed(1)}°</span></div>
                        <div class="text-center"><span class="p-idx d-block">HUMEDAD</span><span class="v-amb ${isHumAlert ? 'text-danger' : 'text-main'}">${hum}%</span></div>
                        <div class="text-center d-none d-lg-block"><span class="p-idx d-block">VARIEDAD</span><span class="badge-v">${variedad || 'S/V'}</span></div>
                    </div>
                    <div class="pulp-grid">${pulpasHtml}</div>
                    <div class="d-flex align-items-center gap-2">
                        <div class="flex-grow-1"><span class="badge-v d-lg-none text-center">${variedad || 'S/V'}</span>${r[13] ? `<div class="obs-general mt-1"><i class="bi bi-info-circle me-1"></i>${r[13]}</div>` : ''}</div>
                        <div class="photo-col">${linkFoto ? `<button class="btn-photo" onclick="window.open('${linkFoto}', '_blank')"><i class="bi bi-camera"></i></button>` : `<button class="btn-photo disabled"><i class="bi bi-camera"></i></button>`}</div>
                    </div>
                </div>`;
        }).join('');

        allData.forEach(row => { latest[row[3]] = row; });
        renderCards(latest);
    }

    function renderCards(latest) {
        const container = document.getElementById('cards-container');
        const activeGroup = groups[currentGroup];
        document.getElementById('group-label').innerText = activeGroup.label;

        container.innerHTML = activeGroup.ids.map(id => {
            const r = latest[id];
            if(!r) return `<div class="cam-card text-muted small text-center">CÁMARA ${id}<br>OFFLINE</div>`;
            
            const limits = getLimits(r[2]);
            const tAmb = Number(r[4] || 0);
            const hum = Number(r[11] || 0);
            let pulpasHtml = "";
            let anyPulpAlert = false;
            
            for (let i = 1; i <= 6; i++) {
                const val = Number(r[4 + i] || 0);
                const isAlert = checkAlert(val, limits.pulpMin, limits.pulpMax);
                if(isAlert) anyPulpAlert = true;
                pulpasHtml += `<div class="p-dot"><span class="p-dot-idx">P${i}</span><span class="p-dot-val ${isAlert ? 'text-danger' : 'text-success'}">${val.toFixed(1)}</span></div>`;
            }

            const isAmbAlert = checkAlert(tAmb, limits.ambMin, limits.ambMax);
            const isHumAlert = hum < 85 || hum > 95;
            const hasAlert = isAmbAlert || isHumAlert || anyPulpAlert;

            return `
                <div class="cam-card ${hasAlert ? 'alert-active' : ''}">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="badge bg-primary" style="font-size:0.6rem">CÁMARA ${id}</span>
                        <span class="p-idx" style="font-size:0.5rem">${new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-end">
                        <div><div class="card-stat-label">Ambiente</div><div class="card-stat-val ${isAmbAlert ? 'text-danger' : 'text-success'}">${tAmb.toFixed(1)}°</div></div>
                        <div class="text-end"><div class="card-stat-label">Humedad</div><div class="card-stat-val ${isHumAlert ? 'text-danger' : 'text-main'}" style="font-size:0.95rem">${hum}%</div></div>
                    </div>
                    <div class="card-pulp-grid">${pulpasHtml}</div>
                    <div class="p-idx text-truncate mt-2 text-center" style="color:var(--accent-soft); font-size:0.55rem; border-top:1px solid rgba(255,255,255,0.05); padding-top:3px;">${r[2] || 'S/V'}</div>
                </div>`;
        }).join('');
    }

    function manualChange(direction) {
        currentGroup = (currentGroup + direction + groups.length) % groups.length;
        const latest = {};
        allData.forEach(row => { latest[row[3]] = row; });
        renderCards(latest);
    }

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(syncData, 60000);
    setInterval(() => { if(!isPaused && allData.length > 0) manualChange(1); }, 8000);
    syncData();
</script>
</body>
</html>
