<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Cámaras Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-soft: #38bdf8;
            --green-soft: #4ade80;
            --red-soft: #f87171;
            --warning-amber: #fbbf24;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER CON LOGO --- */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 15px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
        }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 35px; height: 35px; object-fit: contain; }
        .app-title { font-size: 1.1rem; font-weight: 700; margin: 0; }
        .sync-info {
            font-size: 0.65rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 4px 12px;
            border-radius: 50px;
        }

        /* --- NAVEGACIÓN Y CARDS --- */
        .group-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 15px;
        }
        .nav-btn { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            border-radius: 50%; 
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .cam-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 24px; 
            padding: 18px; 
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-height: 220px;
            display: flex;
            flex-direction: column;
        }
        
        .cam-card.alert { 
            border: 1.5px solid var(--red-soft); 
            background: rgba(248, 113, 113, 0.05);
            animation: pulse-alert 2s infinite;
        }

        @keyframes pulse-alert {
            0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(248, 113, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
        }

        .label-text { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
        .value-text { font-size: 1.2rem; font-weight: 700; }
        .pulp-detail { font-size: 0.6rem; color: var(--text-muted); margin-top: 5px; line-height: 1.2; }
        .time-tag {
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: auto;
            text-align: right;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 8px;
        }

        /* --- TABLA TRANSPARENTE --- */
        .list-section { 
            background: var(--card-bg);
            border-radius: 24px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .table { color: var(--text-main) !important; margin-bottom: 0; background-color: transparent !important; }
        .table thead th { border: none !important; color: var(--accent-soft); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; padding: 8px !important; background-color: transparent !important; }
        .table tbody td { border-color: rgba(255,255,255,0.05) !important; padding: 6px 8px !important; font-size: 0.8rem; vertical-align: middle; background-color: transparent !important; color: var(--text-main); }

        .pulp-container { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .pulp-box {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 8px;
            min-width: 65px;
            text-align: center;
        }
        
        .obs-tag { 
            display: block; 
            font-size: 0.55rem; 
            color: var(--warning-amber); 
            line-height: 1.1; 
            margin-top: 1px; 
            font-weight: 500; 
        }

        .obs-general-row { 
            font-size: 0.7rem; 
            color: #cbd5e1; 
            background: rgba(56, 189, 248, 0.08); 
            border-radius: 6px; 
            padding: 6px 10px; 
            margin-top: 8px; 
            border-left: 3px solid var(--accent-soft);
            text-align: left;
        }

        .val-danger { color: var(--red-soft) !important; font-weight: 800; }
        .val-success { color: var(--green-soft) !important; font-weight: 700; }
        .val-white { color: #ffffff !important; font-weight: 700; }
        
        .badge-variety {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-soft);
            padding: 2px 8px;
            border-radius: 50px;
            font-size: 0.65rem;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-section">
        <img src="logo-icono.png" alt="Logo" class="logo-img">
        <h1 class="app-title">Monitor de Cámaras</h1>
    </div>
    <div class="sync-info"><i class="bi bi-clock me-1"></i> <span id="reloj">00:00:00</span></div>
</header>

<div class="cams-section" id="interactive-area">
    <div class="group-nav">
        <button class="nav-btn" onclick="changeGroup(-1)"><i class="bi bi-chevron-left"></i></button>
        <span id="group-label" class="badge rounded-pill bg-dark px-3 py-2">Cámaras</span>
        <button class="nav-btn" onclick="changeGroup(1)"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div id="cards-container" class="cards-grid"></div>
</div>

<div class="list-section">
    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>IDENTIFICACIÓN</th>
                    <th>HORA</th>
                    <th>VARIEDAD</th>
                    <th class="text-center">AMB.</th>
                    <th class="text-center">PULPAS (P1 - P6)</th>
                    <th class="text-center">HUM%</th>
                    <th class="text-center">FOTO</th>
                </tr>
            </thead>
            <tbody id="data-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwPxKSx5D9v7GZI-Vc3Z_-8mlLlRwqa6Plw3pLc6E0iy3rdtWnSkd2XdkyJ3tU3SO0/exec";
    const BASE_URL = WEB_APP_URL + "?pestana=Frigorifico";
    
    let allData = [];
    let currentGroup = 0;
    let isPaused = false;

    const groups = [
        { label: "Cámaras 2 - 5", ids: ["2", "3", "4", "5"] },
        { label: "Cámaras 6 - 9", ids: ["6", "7", "8", "9"] },
        { label: "Cámaras 10 - 12", ids: ["10", "11", "12"] }
    ];

    async function syncData() {
        try {
            const response = await fetch(BASE_URL + "&t=" + new Date().getTime());
            const json = await response.json();
            if (!json || json.length < 2) return;
            const hoyStr = new Date().toLocaleDateString();
            allData = json.slice(1).filter(row => row[0] && new Date(row[0]).toLocaleDateString() === hoyStr);
            drawTable();
            drawCards();
        } catch (e) { console.error(e); }
    }

    function drawTable() {
        const body = document.getElementById('data-table-body');
        const uniqueCams = {};
        allData.forEach(row => { uniqueCams[row[3]] = row; });
        const sortedRows = Object.values(uniqueCams).sort((a, b) => parseInt(a[3]) - parseInt(b[3]));

        body.innerHTML = sortedRows.map(r => {
            const hora = new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const tAmb = Number(r[4] || 0);
            const hum = Number(r[11] || 0);
            const obsGral = r[13] || '';
            const detalles = r[14] ? r[14].split(' | ') : [];

            const ambClass = (tAmb > 1.5) ? 'val-danger' : 'val-success';
            const humClass = (hum < 85 || hum > 95) ? 'val-danger' : 'val-white';

            let pulpasHtml = "";
            for (let i = 1; i <= 6; i++) {
                const val = Number(r[4 + i] || 0);
                const pClass = (val > 2.0) ? 'text-danger fw-bold' : 'text-success';
                
                let obsFruto = "";
                if (detalles[i-1]) {
                    const match = detalles[i-1].match(/\(([^)]+)\)/);
                    obsFruto = match ? match[1] : "";
                }

                pulpasHtml += `
                    <div class="pulp-box">
                        <span style="font-size:0.5rem; color:var(--text-muted); display:block;">P${i}</span>
                        <span class="${pClass}">${val.toFixed(1)}°</span>
                        ${obsFruto ? `<span class="obs-tag">${obsFruto}</span>` : ''}
                    </div>`;
            }

            return `
                <tr style="background-color: transparent !important;">
                    <td class="fw-bold" style="color:var(--accent-soft) !important; font-size:1rem; background-color: transparent !important;">
                        CÁMARA ${r[3]}
                    </td>
                    <td class="text-muted small" style="background-color: transparent !important;">${hora}</td>
                    <td style="background-color: transparent !important;"><span class="badge-variety">${r[2] || 'S/V'}</span></td>
                    <td class="text-center ${ambClass}" style="background-color: transparent !important;">${tAmb.toFixed(1)}°</td>
                    <td style="background-color: transparent !important;">
                        <div class="pulp-container">${pulpasHtml}</div>
                        ${obsGral ? `<div class="obs-general-row"><i class="bi bi-chat-left-dots-fill me-2"></i>${obsGral}</div>` : ''}
                    </td>
                    <td class="text-center ${humClass}" style="font-size:1.1rem; background-color: transparent !important;">${hum}%</td>
                    <td class="text-center" style="background-color: transparent !important;">
                        ${r[12] && r[12].startsWith('http') ? `<a href="${r[12]}" target="_blank" style="color:var(--accent-soft)"><i class="bi bi-camera-fill"></i></a>` : '-'}
                    </td>
                </tr>`;
        }).join('');
    }

    function drawCards() {
        const container = document.getElementById('cards-container');
        const latestByCam = {};
        allData.forEach(row => { latestByCam[row[3]] = row; });
        const activeGroup = groups[currentGroup];
        document.getElementById('group-label').innerText = activeGroup.label;
        container.innerHTML = "";

        activeGroup.ids.forEach(id => {
            const r = latestByCam[id];
            const div = document.createElement('div');
            div.className = "cam-card";
            if(!r) {
                div.innerHTML = `<span class="label-text" style="color:var(--accent-soft)">Cámara ${id}</span><div class="text-muted small mt-2">Sin datos</div>`;
            } else {
                const tAmb = Number(r[4] || 0);
                const hum = Number(r[11] || 0);
                const pulpas = [r[5], r[6], r[7], r[8], r[9], r[10]].map(v => Number(v || 0));
                const tPulpProm = (pulpas.reduce((a, b) => a + b, 0) / 6).toFixed(1);
                if (tAmb > 1.5 || pulpas.some(p => p > 2) || hum < 85 || hum > 95) div.classList.add('alert');

                div.innerHTML = `
                    <span class="label-text" style="color:var(--accent-soft)">CÁMARA ${id}</span>
                    <div class="fw-bold text-truncate mb-2" style="font-size:0.75rem;">${r[2] || 'S/V'}</div>
                    <div class="row g-2 mb-2">
                        <div class="col-6"><p class="label-text">Ambiente</p><div class="value-text ${tAmb > 1.5 ? 'text-danger' : 'text-success'}">${tAmb.toFixed(1)}°</div></div>
                        <div class="col-6"><p class="label-text">Prom. Pulpa</p><div class="value-text">${tPulpProm}°</div></div>
                    </div>
                    <div class="pulp-detail">P1:${pulpas[0]} P2:${pulpas[1]} P3:${pulpas[2]}...</div>
                    <div class="mt-2"><p class="label-text">Humedad</p><div class="value-text ${hum < 85 || hum > 95 ? 'text-danger' : 'val-white'}">${hum.toFixed(0)}%</div></div>
                    <div class="time-tag">${new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                `;
            }
            container.appendChild(div);
        });
    }

    function changeGroup(n) { currentGroup = (currentGroup + n + groups.length) % groups.length; drawCards(); }
    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(syncData, 60000);
    setInterval(() => { if(!isPaused) changeGroup(1); }, 10000);
    syncData();
</script>
</body>
</html>
