<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Cámaras Pro - Adaptable</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-soft: #38bdf8;
            --green-soft: #4ade80;
            --red-soft: #f87171;
            --warning-amber: #fbbf24;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        /* --- HEADER ADAPTABLE --- */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 15px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 15px;
        }
        .logo-img { width: 35px; height: 35px; }
        .app-title { font-size: 1rem; font-weight: 700; margin: 0; }

        /* --- GRILLA DE TARJETAS (SUPERIOR) --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .cam-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        .cam-card.alert { border: 1px solid var(--red-soft); }

        /* --- TABLA / LISTADO RESPONSIVO --- */
        .list-section { 
            background: var(--card-bg);
            border-radius: 20px;
            padding: 10px;
        }

        /* DISEÑO PARA PC / TV */
        @media (min-width: 768px) {
            .mobile-label { display: none; }
            .table-responsive { display: block; }
            .row-mobile-card { display: table-row; }
        }

        /* DISEÑO PARA TELÉFONOS */
        @media (max-width: 767px) {
            .table thead { display: none; } /* Escondemos cabecera de tabla */
            .table, .table tbody, .table tr, .table td { display: block; width: 100%; }
            
            .table tr {
                margin-bottom: 15px;
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 15px;
                padding: 10px;
                background: rgba(255,255,255,0.02);
            }

            .table td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: none !important;
                padding: 5px 8px !important;
                text-align: right;
            }

            .table td::before {
                content: attr(data-label);
                font-weight: 600;
                color: var(--accent-soft);
                text-transform: uppercase;
                font-size: 0.7rem;
                text-align: left;
            }

            .pulp-container {
                justify-content: flex-end !important;
                gap: 5px;
            }
            
            .app-title { font-size: 0.9rem; }
            .cards-grid { grid-template-columns: 1fr 1fr; } /* 2 columnas en móvil */
        }

        /* Elementos internos */
        .pulp-box {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px;
            border-radius: 8px;
            min-width: 55px;
            text-align: center;
        }
        .pulp-num { font-size: 0.8rem; font-weight: 700; display: block; }
        .obs-tag { font-size: 0.5rem; color: var(--warning-amber); display: block; }
        
        .val-danger { color: var(--red-soft) !important; font-weight: bold; }
        .val-success { color: var(--green-soft) !important; }
        
        .badge-variety { background: rgba(56, 189, 248, 0.1); color: var(--accent-soft); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="d-flex align-items-center gap-2">
        <img src="logo-icono.png" alt="Logo" class="logo-img">
        <h1 class="app-title">MONITOR FRIGO</h1>
    </div>
    <div id="reloj" style="font-size: 0.8rem; color: var(--text-muted);">00:00</div>
</header>

<div id="cards-container" class="cards-grid"></div>

<div class="list-section">
    <table class="table">
        <thead>
            <tr>
                <th>CÁMARA</th>
                <th>HORA</th>
                <th>VARIEDAD</th>
                <th>AMB.</th>
                <th>PULPAS</th>
                <th>HUM%</th>
            </tr>
        </thead>
        <tbody id="data-table-body">
            <!-- Los datos se cargan aquí -->
        </tbody>
    </table>
</div>

<script>
    const WEB_APP_URL = "TU_URL_DE_APPS_SCRIPT"; 

    async function syncData() {
        try {
            const response = await fetch(WEB_APP_URL + "?pestana=Frigorifico&t=" + new Date().getTime());
            const json = await response.json();
            if (!json || json.length < 2) return;

            const hoyStr = new Date().toLocaleDateString();
            const allData = json.slice(1).filter(row => row[0] && new Date(row[0]).toLocaleDateString() === hoyStr);
            
            // Agrupar por cámara (último registro)
            const latestByCam = {};
            allData.forEach(row => { latestByCam[row[3]] = row; });
            const sortedData = Object.values(latestByCam).sort((a, b) => parseInt(a[3]) - parseInt(b[3]));

            drawUI(sortedData);
        } catch (e) { console.error("Error de sincronización", e); }
    }

    function drawUI(data) {
        const tableBody = document.getElementById('data-table-body');
        const cardsContainer = document.getElementById('cards-container');
        
        // 1. Dibujar Tarjetas Rápidas (Superiores)
        cardsContainer.innerHTML = data.slice(0, 4).map(r => `
            <div class="cam-card ${Number(r[4]) > 1.5 ? 'alert' : ''}">
                <div style="font-size:0.6rem; color:var(--accent-soft)">CAM ${r[3]}</div>
                <div style="font-size:1rem; font-weight:700">${Number(r[4]).toFixed(1)}°</div>
                <div style="font-size:0.6rem; color:var(--text-muted)">${new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
            </div>
        `).join('');

        // 2. Dibujar Tabla Responsiva
        tableBody.innerHTML = data.map(r => {
            const tAmb = Number(r[4] || 0);
            const hum = Number(r[11] || 0);
            const detalles = r[14] ? r[14].split(' | ') : [];
            const hora = new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

            let pulpasHtml = "";
            for (let i = 1; i <= 6; i++) {
                const val = Number(r[4 + i] || 0);
                const pClass = (val > 2.0) ? 'text-danger' : 'text-success';
                let obs = "";
                if (detalles[i-1]) {
                    const match = detalles[i-1].match(/\(([^)]+)\)/);
                    obs = match ? match[1] : "";
                }
                pulpasHtml += `
                    <div class="pulp-box">
                        <span class="pulp-num ${pClass}">${val.toFixed(1)}</span>
                        <span class="obs-tag">${obs}</span>
                    </div>`;
            }

            return `
                <tr>
                    <td data-label="Cámara" style="font-weight:700; color:var(--accent-soft)">CÁMARA ${r[3]}</td>
                    <td data-label="Hora">${hora}</td>
                    <td data-label="Variedad"><span class="badge-variety">${r[2] || 'S/V'}</span></td>
                    <td data-label="Ambiente" class="${tAmb > 1.5 ? 'val-danger' : 'val-success'}">${tAmb.toFixed(1)}°C</td>
                    <td data-label="Pulpas P1-P6">
                        <div class="d-flex pulp-container" style="gap:4px; flex-wrap:wrap;">${pulpasHtml}</div>
                    </td>
                    <td data-label="Humedad" class="${hum < 85 ? 'val-danger' : ''}">${hum}%</td>
                </tr>
            `;
        }).join('');
    }

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}); }, 1000);
    setInterval(syncData, 30000);
    syncData();
</script>

</body>
</html>
