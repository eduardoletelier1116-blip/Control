<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Frigorífico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        body { background: #0f172a; color: white; padding: 20px; font-family: sans-serif; }
        .grid-camaras { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card-cam { background: #1e293b; border-radius: 15px; padding: 20px; border-top: 5px solid #3b82f6; position: relative; }
        .card-cam.danger { border-top-color: #ef4444; background: #2d1a1a; animation: pulse 2s infinite; }
        .cam-num { position: absolute; right: 15px; top: 10px; font-size: 2.5rem; font-weight: 900; opacity: 0.1; }
        .data-val { font-size: 1.2rem; font-weight: bold; color: #3b82f6; }
        .danger .data-val { color: #ef4444; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-snow2 text-info me-2"></i>ESTADO CÁMARAS</h2>
        <div id="reloj" class="fs-4 fw-bold"></div>
    </div>

    <div id="contenedor" class="grid-camaras">
        </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbx_gL3X4Fvd--qgF-vUJAUpRQkmLDeDfLgHEsD9vCYP9b_wV7lRHexe-vvsF4mxFHVObA/exec?pestana=frigo";

    const RANGOS = {
        "Galas": { tA: [-1,0], tP: [-0.5, 0.5] },
        "Granny": { tA: [0,1], tP: [1, 2] },
        "Fuji": { tA: [-1,0], tP: [-0.5, 0.5] },
        "Red Delicius": { tA: [-1,0], tP: [-0.5, 0.5] },
        "Cripps Pink": { tA: [0,1], tP: [1, 2] }
    };

    async function actualizar() {
        try {
            const res = await fetch(URL_SCRIPT);
            const datos = await res.json();
            const ultimos = {};
            
            // Tomamos el último registro de cada cámara
            datos.slice(1).forEach(f => { ultimos[f[3]] = f; });

            const contenedor = document.getElementById('contenedor');
            contenedor.innerHTML = "";

            for(let i=2; i<=12; i++) {
                const cam = "Cámara " + i;
                const reg = ultimos[cam];
                const div = document.createElement('div');
                div.className = 'card-cam';
                
                if(!reg) {
                    div.innerHTML = `<div class="cam-num">${i}</div><h4>Cámara ${i}</h4><p class="text-muted">Sin datos</p>`;
                } else {
                    const [fecha, op, varid, , tA, tP, hum] = reg;
                    const r = RANGOS[varid] || { tA: [-10,10], tP: [-10,10] };
                    const isDanger = (tA < r.tA[0] || tA > r.tA[1] || tP < r.tP[0] || tP > r.tP[1] || hum < 85 || hum > 95);
                    
                    if(isDanger) div.classList.add('danger');

                    div.innerHTML = `
                        <div class="cam-num">${i}</div>
                        <div class="d-flex justify-content-between">
                            <h4 class="mb-0">Cámara ${i}</h4>
                            <span class="badge bg-secondary">${varid}</span>
                        </div>
                        <hr class="opacity-25">
                        <div class="d-flex justify-content-between"><span>Ambiente:</span><span class="data-val">${tA}°</span></div>
                        <div class="d-flex justify-content-between"><span>Pulpa:</span><span class="data-val">${tP}°</span></div>
                        <div class="d-flex justify-content-between"><span>Humedad:</span><span class="data-val text-info">${hum}%</span></div>
                        <div class="mt-3 text-muted" style="font-size: 0.7rem;">
                            ${op} | ${new Date(fecha).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                        </div>
                    `;
                }
                contenedor.appendChild(div);
            }
        } catch(e) { console.log("Error de red"); }
    }

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    actualizar();
    setInterval(actualizar, 30000);
</script>
</body>
</html>
