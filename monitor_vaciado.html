<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor Frigorífico - Alta Precisión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; margin: 0; }
        .header-monitor { background: #1e293b; padding: 10px 25px; border-bottom: 2px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .cams-section { height: 40%; position: relative; display: flex; align-items: center; justify-content: center; padding: 0 50px; background: rgba(30, 41, 59, 0.2); }
        .cam-card { background: #1e293b; border: 1px solid #475569; border-radius: 12px; flex: 1; margin: 0 8px; padding: 12px; position: relative; max-width: 250px; min-height: 185px; display: flex; flex-direction: column; }
        .cam-card.alert { border: 2px solid #ef4444; background: #2d1a1a; animation: pulse 2s infinite; }
        .list-section { flex-grow: 1; background: #020617; padding: 15px; overflow-y: auto; border-top: 2px solid #1e293b; }
        .table { color: #cbd5e1; font-size: 0.85rem; }
        .table thead th { background: #1e293b; color: #3b82f6; position: sticky; top: -16px; z-index: 10; border: none; }
        .label-text { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; margin-bottom: 0; }
        .value-text { font-size: 1.25rem; font-weight: bold; }
        .text-danger { color: #f87171 !important; }
        .text-success { color: #4ade80 !important; }
        .nav-btn { background: #1e293b; border: 1px solid #3b82f6; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; position: absolute; z-index: 20; }
        .btn-L { left: 10px; } .btn-R { right: 10px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

<div class="header-monitor">
    <div class="d-flex align-items-center">
        <h6 class="mb-0 fw-bold">CENTRAL DE CONTROL <span class="text-info">| FRIGORÍFICO</span></h6>
    </div>
    <div id="reloj" class="fw-bold text-info">00:00:00</div>
</div>

<div class="cams-section" id="interactive-area">
    <button class="nav-btn btn-L" onclick="changeGroup(-1)"><i class="bi bi-chevron-left"></i></button>
    <div id="cards-container" class="d-flex justify-content-center w-100"></div>
    <button class="nav-btn btn-R" onclick="changeGroup(1)"><i class="bi bi-chevron-right"></i></button>
</div>

<div class="list-section">
    <table class="table table-dark table-hover">
        <thead>
            <tr>
                <th>HORA</th><th>CÁMARA</th><th>VARIEDAD(ES)</th><th class="text-center">T. AMB</th><th class="text-center">PULPA</th><th class="text-center">HUM %</th><th class="text-center">FOTO</th>
            </tr>
        </thead>
        <tbody id="data-table-body"></tbody>
    </table>
</div>

<script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbw-yUjvbrg_XxbnkfDrn7jR9EwQaoB5LSov-PovhPrhxumg0OdLGV7rxnZFtbSQZy1u9g/exec?pestana=Frigorifico";
    
    let allData = [];
    let currentGroup = 0;
    let isPaused = false;

    async function syncData() {
        try {
            const response = await fetch(BASE_URL + "&cache=" + new Date().getTime());
            const json = await response.json();
            
            // Invertimos para que la FILA MÁS NUEVA sea el índice [0]
            allData = json.slice(1).reverse();
            
            drawTable();
            if(!isPaused) drawCards();
        } catch (e) { console.error("Error sincronizando..."); }
    }

    function drawCards() {
        const container = document.getElementById('cards-container');
        const latestByCam = {};

        // MAPEO CON NORMALIZACIÓN (Arregla el error de "Cámara Cámara 4")
        allData.forEach(row => {
            const rawCam = String(row[2] || "").toLowerCase(); // Columna C (índice 2)
            const numMatch = rawCam.match(/\d+/); // Extrae solo el número
            
            if (numMatch) {
                const cleanName = "Cámara " + numMatch[0];
                if (!latestByCam[cleanName]) {
                    latestByCam[cleanName] = row; 
                }
            }
        });

        const groups = [
            ["Cámara 2", "Cámara 3", "Cámara 4", "Cámara 5"],
            ["Cámara 6", "Cámara 7", "Cámara 8", "Cámara 9"],
            ["Cámara 10", "Cámara 11", "Cámara 12"]
        ];

        const activeSelection = groups[currentGroup];
        container.innerHTML = "";

        activeSelection.forEach(name => {
            const r = latestByCam[name];
            const div = document.createElement('div');
            div.className = "cam-card";
            
            if(!r) {
                div.innerHTML = `<h6 class="fw-bold">${name}</h6><p class="text-muted small mt-4">Sin datos hoy</p>`;
            } else {
                // MAPEADO CORRECTO SEGÚN TU EXCEL: 0:Hora, 1:Operador, 2:Cámara, 3:Variedad, 4:Amb, 5:Pulpa, 6:Hum
                const [hora, op, cam, vars, tAmb, tPulp, hum] = r;
                
                // Alert: T.Amb > 1.5, T.Pulp > 2, Hum fuera de 85-95%
                const isErr = (tAmb > 1.5 || tPulp > 2 || hum < 85 || hum > 95);
                if(isErr) div.classList.add('alert');

                div.innerHTML = `
                    <h6 class="fw-bold mb-1">${name}</h6>
                    <div class="small text-info text-truncate mb-2" style="font-size:0.7rem;">${vars || '---'}</div>
                    <div class="row g-1 mt-auto">
                        <div class="col-6"><p class="label-text">Ambiente</p><div class="value-text ${tAmb>1.5?'text-danger':'text-success'}">${tAmb}°</div></div>
                        <div class="col-6"><p class="label-text">Pulpa</p><div class="value-text ${tPulp>2?'text-danger':'text-success'}">${tPulp}°</div></div>
                        <div class="col-12 mt-1"><p class="label-text">Humedad</p><div class="value-text ${(hum<85||hum>95)?'text-danger':'text-success'}">${hum}%</div></div>
                    </div>
                    <div style="font-size:0.55rem; color:#64748b; margin-top:8px; text-align:right; border-top:1px solid #334155; padding-top:3px;">
                        Actualizado: ${new Date(hora).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                    </div>`;
            }
            container.appendChild(div);
        });
        currentGroup = (currentGroup + 1) % 3;
    }

    function drawTable() {
        const body = document.getElementById('data-table-body');
        body.innerHTML = allData.slice(0, 20).map(r => `
            <tr>
                <td class="text-info fw-bold">${new Date(r[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                <td><span class="badge bg-primary px-2">${r[2]}</span></td>
                <td class="small" style="max-width:160px; overflow:hidden; text-overflow:ellipsis;">${r[3]}</td>
                <td class="text-center fw-bold ${r[4]>1.5?'text-danger':''}">${r[4]}°</td>
                <td class="text-center fw-bold ${r[5]>2?'text-danger':''}">${r[5]}°</td>
                <td class="text-center fw-bold ${(r[6]<85||r[6]>95)?'text-danger':''}">${r[6]}%</td>
                <td class="text-center">${r[7] ? `<a href="${r[7]}" target="_blank" class="text-primary"><i class="bi bi-camera-fill"></i></a>` : '-'}</td>
            </tr>
        `).join('');
    }

    function changeGroup(n) { currentGroup = (currentGroup + n + 3) % 3; drawCards(); }
    
    document.getElementById('interactive-area').onmouseenter = () => isPaused = true;
    document.getElementById('interactive-area').onmouseleave = () => isPaused = false;

    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(syncData, 45000); 
    setInterval(() => { if(!isPaused) drawCards(); }, 8000);

    syncData();
</script>
</body>
</html>
