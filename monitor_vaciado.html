<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Vaciado</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-soft: #38bdf8;
            --green-soft: #4ade80;
            --red-soft: #f87171;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .app-header {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 12px;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 10px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
        }

        .logo-section { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            min-width: 0;
        }

        .logo-img { 
            height: 30px; 
            width: auto; 
        }

        .app-title { 
            font-size: 1.1rem; 
            font-weight: 700; 
            margin: 0; 
            white-space: nowrap;
        }

        .date-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 5px 8px;
            border-radius: 50px;
        }

        .date-control label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            margin: 0;
        }

        .date-control input {
            background: #0f172a;
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            outline: none;
        }

        .btn-hoy {
            border: none;
            background: var(--accent-soft);
            color: #0f172a;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 50px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .sync-info {
            font-size: 0.65rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 6px 10px;
            border-radius: 50px;
            text-align: right;
            min-width: 130px;
        }

        .day-summary {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .summary-pill {
            background: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.18);
            color: var(--accent-soft);
            padding: 4px 10px;
            border-radius: 50px;
        }

        .data-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 15px;
            height: 25vh;
            min-height: 220px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .indicator-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 50px;
        }

        .status-normal { 
            background: rgba(74, 222, 128, 0.1); 
            color: var(--green-soft); 
            border: 1px solid rgba(74, 222, 128, 0.2); 
        }

        .status-fuera { 
            background: rgba(248, 113, 113, 0.1); 
            color: var(--red-soft); 
            border: 1px solid rgba(248, 113, 113, 0.2); 
        }

        .status-sin-datos {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .empty-chart {
            height: 85%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }

        .modal-content { 
            background: var(--card-bg); 
            border-radius: 25px; 
            border: none; 
            color: var(--text-main); 
        }

        @media (max-width: 768px) {
            .app-header {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .date-control {
                justify-content: space-between;
                border-radius: 16px;
                padding: 8px;
            }

            .date-control input {
                flex: 1;
            }

            .sync-info {
                text-align: center;
                width: 100%;
            }

            .app-title {
                font-size: 1rem;
            }

            .data-card {
                height: 260px;
            }
        }
    </style>
</head>

<body>

<div class="container-fluid">

    <header class="app-header">
        <div class="logo-section">
            <img src="logo-icono.png" alt="Logo" class="logo-img" onerror="this.style.visibility='hidden'">
            <h1 class="app-title">Monitor de Vaciado</h1>
        </div>

        <div class="date-control">
            <label for="fechaConsulta">Día</label>
            <input type="date" id="fechaConsulta" onchange="refresh()">
            <button class="btn-hoy" onclick="volverAHoy()">Hoy</button>
        </div>

        <div class="sync-info">
            <span id="syncTime">Sincronizando...</span>
        </div>
    </header>

    <div class="day-summary">
        <span class="summary-pill" id="fechaMostrada">--/--/----</span>
        <span class="summary-pill" id="totalRegistros">0 registros</span>
        <span class="summary-pill" id="rangoHorario">Sin horario</span>
    </div>

    <div class="data-card">
        <div class="card-header">
            <span class="indicator-label">PPM (30-100)</span>
            <div id="status_ppm"></div>
        </div>
        <div id="chart_ppm" style="height: 85%; width: 100%;"></div>
    </div>

    <div class="data-card">
        <div class="card-header">
            <span class="indicator-label">ORP (750-850)</span>
            <div id="status_orp"></div>
        </div>
        <div id="chart_orp" style="height: 85%; width: 100%;"></div>
    </div>

    <div class="data-card">
        <div class="card-header">
            <span class="indicator-label">PH (6.5-7.5)</span>
            <div id="status_ph"></div>
        </div>
        <div id="chart_ph" style="height: 85%; width: 100%;"></div>
    </div>
</div>

<div class="modal fade" id="fotoModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h6 class="modal-title fw-bold">Registro Detallado</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center p-4">
                <img id="imgRegistro" src="" class="img-fluid rounded-4 mb-3 shadow">
                <div id="infoRegistro" class="p-3 rounded-4 small" style="background: rgba(0,0,0,0.2); color: var(--accent-soft);"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbytKO8JK-HP2jkca5tnMb4U7uW79yEGa9CDeeFSvhAdjL_NaE7szvXQU2olAW9n56sziQ/exec?pestana=Vaciado";
    const LIMITS = { 
        ppm: [30, 100], 
        orp: [750, 850], 
        ph: [6.5, 7.5] 
    };

    let charts = {};

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(inicializar);
    setInterval(refresh, 30000);

    function inicializar() {
        document.getElementById("fechaConsulta").value = obtenerFechaHoyISO();
        refresh();
    }

    function obtenerFechaHoyISO() {
        const hoy = new Date();
        const y = hoy.getFullYear();
        const m = String(hoy.getMonth() + 1).padStart(2, '0');
        const d = String(hoy.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function volverAHoy() {
        document.getElementById("fechaConsulta").value = obtenerFechaHoyISO();
        refresh();
    }

    function formatearFechaCL(fechaISO) {
        if (!fechaISO || !fechaISO.includes("-")) return "--/--/----";
        const p = fechaISO.split("-");
        return `${p[2]}/${p[1]}/${p[0]}`;
    }

    function normalizarFechaISO(valor) {
        if (!valor) return "";

        if (valor instanceof Date) {
            const y = valor.getFullYear();
            const m = String(valor.getMonth() + 1).padStart(2, '0');
            const d = String(valor.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        const str = String(valor).trim();

        if (str.includes("/")) {
            const fechaParte = str.split(" ")[0];
            const p = fechaParte.split("/");
            if (p.length === 3) {
                return `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
            }
        }

        if (str.includes("-")) {
            return str.split("T")[0].split(" ")[0];
        }

        const date = new Date(str);
        if (!isNaN(date.getTime())) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        return "";
    }

    function extraerHora(valor) {
        if (!valor) return "--:--";

        const str = String(valor).trim();
        const match = str.match(/(\d{1,2}:\d{2})/);

        if (match) return match[1];

        const date = new Date(str);
        if (!isNaN(date.getTime())) {
            return date.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        return "--:--";
    }

    function horaASegundos(valor) {
        const h = extraerHora(valor);
        const partes = h.split(":").map(n => parseInt(n, 10));

        if (partes.length < 2 || isNaN(partes[0]) || isNaN(partes[1])) return 0;

        return partes[0] * 3600 + partes[1] * 60;
    }

    function limpiarGrafico(divId, statusId, mensaje) {
        charts[divId] = null;

        document.getElementById(divId).innerHTML = `
            <div class="empty-chart">
                ${mensaje}
            </div>
        `;

        document.getElementById(statusId).innerHTML = 
            '<span class="status-badge status-sin-datos">Sin datos</span>';
    }

    function actualizarResumenDia(data) {
        const fechaSeleccionada = document.getElementById("fechaConsulta").value;

        document.getElementById("fechaMostrada").innerText = formatearFechaCL(fechaSeleccionada);
        document.getElementById("totalRegistros").innerText = `${data.length} registro${data.length === 1 ? "" : "s"}`;

        if (data.length === 0) {
            document.getElementById("rangoHorario").innerText = "Sin horario";
            return;
        }

        const ordenados = [...data].sort((a, b) => horaASegundos(a[0]) - horaASegundos(b[0]));
        const primeraHora = extraerHora(ordenados[0][0]);
        const ultimaHora = extraerHora(ordenados[ordenados.length - 1][0]);

        document.getElementById("rangoHorario").innerText = `${primeraHora} - ${ultimaHora}`;
    }

    function refresh() {
        const fechaSeleccionada = document.getElementById("fechaConsulta").value || obtenerFechaHoyISO();

        fetch(WEB_APP_URL + "&t=" + new Date().getTime())
            .then(r => r.json())
            .then(res => {
                if (res.error) {
                    document.getElementById('syncTime').innerText = "Reintentando...";
                    return;
                }

                const rawData = res.slice(1)
                    .filter(f => {
                        if (!f[0]) return false;
                        return normalizarFechaISO(f[0]) === fechaSeleccionada;
                    })
                    .sort((a, b) => horaASegundos(a[0]) - horaASegundos(b[0]));

                actualizarResumenDia(rawData);

                if (rawData.length === 0) {
                    document.getElementById('syncTime').innerText = "Día sin datos";

                    limpiarGrafico('chart_ppm', 'status_ppm', 'Sin registros PPM para este día');
                    limpiarGrafico('chart_orp', 'status_orp', 'Sin registros ORP para este día');
                    limpiarGrafico('chart_ph', 'status_ph', 'Sin registros PH para este día');

                    return;
                }

                document.getElementById('syncTime').innerText = 
                    "Act: " + new Date().toLocaleTimeString([], {
                        hour: '2-digit', 
                        minute:'2-digit'
                    });

                drawChart(rawData, 'chart_ppm', 'status_ppm', LIMITS.ppm, '#38bdf8', 2, '#');
                drawChart(rawData, 'chart_orp', 'status_orp', LIMITS.orp, '#fb923c', 3, '#');
                drawChart(rawData, 'chart_ph', 'status_ph', LIMITS.ph, '#4ade80', 4, '#.0');
            })
            .catch(err => {
                console.error(err);
                document.getElementById('syncTime').innerText = "Error de Red";
            });
    }

    function drawChart(data, divId, statusId, range, baseColor, colIdx, format) {
        let dt = new google.visualization.DataTable();

        dt.addColumn('string', 'X');
        dt.addColumn('number', 'Valor');
        dt.addColumn({type: 'string', role: 'style'});
        dt.addColumn({type: 'string', role: 'annotation'});
        dt.addColumn('number', 'Min');
        dt.addColumn('number', 'Max');

        let minVal = range[0];
        let maxVal = range[1];

        data.forEach(f => {
            let h = extraerHora(f[0]);
            let val = Number(f[colIdx]);
            let kilos = f[5] ? f[5] + "k" : ""; 
            
            if (val < minVal) minVal = val;
            if (val > maxVal) maxVal = val;
            
            let fuera = (val < range[0] || val > range[1]);
            let estilo = fuera 
                ? 'point { size: 7; fill-color: #f87171; }' 
                : 'point { size: 5; fill-color: ' + baseColor + '; }';
            
            dt.addRow([
                h + "\n" + kilos, 
                val, 
                estilo, 
                f[6] === "SI" ? "MOD" : null, 
                range[0], 
                range[1]
            ]);
        });

        const padding = (range[1] - range[0]) * 0.5;
        const vMin = Math.min(range[0], minVal) - padding;
        const vMax = Math.max(range[1], maxVal) + padding;

        charts[divId] = new google.visualization.ComboChart(document.getElementById(divId));

        google.visualization.events.addListener(charts[divId], 'select', function() {
            let sel = charts[divId].getSelection()[0];

            if (sel && sel.row !== null) {
                let registro = data[sel.row];

                if (registro[7] && registro[7] !== "Sin foto") {
                    document.getElementById('imgRegistro').src = registro[7];
                    document.getElementById('infoRegistro').innerText = 
                        `Op: ${registro[1]} | ${registro[5]} KG | ${extraerHora(registro[0])}`;

                    new bootstrap.Modal(document.getElementById('fotoModal')).show();
                }
            }
        });

        charts[divId].draw(dt, {
            backgroundColor: 'transparent', 
            legend: 'none',
            chartArea: { 
                width: '90%', 
                height: '70%', 
                top: 10, 
                left: 45, 
                right: 10, 
                bottom: 50 
            },
            animation: { 
                duration: 500, 
                easing: 'out', 
                startup: true 
            },
            hAxis: { 
                textStyle: { 
                    color: '#64748b', 
                    fontSize: 9 
                }, 
                gridlines: { 
                    color: 'transparent' 
                } 
            },
            vAxis: { 
                textStyle: { 
                    color: '#94a3b8', 
                    fontSize: 10 
                }, 
                gridlines: { 
                    color: '#334155' 
                },
                viewWindow: { 
                    min: vMin, 
                    max: vMax 
                },
                ticks: [range[0], range[1]],
                format: format
            },
            series: { 
                0: { 
                    color: baseColor, 
                    lineWidth: 3, 
                    pointsVisible: true, 
                    type: 'line' 
                }, 
                1: { 
                    color: '#475569', 
                    lineDashStyle: [4, 4], 
                    lineWidth: 2, 
                    pointSize: 0 
                }, 
                2: { 
                    color: '#475569', 
                    lineDashStyle: [4, 4], 
                    lineWidth: 2, 
                    pointSize: 0 
                } 
            },
            annotations: { 
                textStyle: { 
                    fontSize: 9, 
                    color: '#f87171', 
                    bold: true 
                }, 
                alwaysOutside: true 
            }
        });

        const ultimoVal = Number(data[data.length - 1][colIdx]);
        const isOk = !(ultimoVal < range[0] || ultimoVal > range[1]);

        document.getElementById(statusId).innerHTML = isOk ? 
            '<span class="status-badge status-normal">Normal</span>' : 
            '<span class="status-badge status-fuera">Revisar</span>';
    }
</script>

</body>
</html>
