<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Vaciado</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root {
            --bg-app: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-soft: #38bdf8;
            --green-soft: #4ade80;
            --red-soft: #f87171;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            /* Se eliminó overflow:hidden para permitir scroll en móviles */
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 10px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
        }

        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 30px; width: auto; }
        .app-title { font-size: 1.1rem; font-weight: 700; margin: 0; }

        .sync-info {
            font-size: 0.65rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 4px 10px;
            border-radius: 50px;
        }

        .data-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 15px;
            height: 26vh; /* Reducido ligeramente para mejor encuadre */
            min-height: 220px; /* Asegura que no se aplaste demasiado */
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .indicator-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 50px;
        }
        .status-normal { background: rgba(74, 222, 128, 0.1); color: var(--green-soft); border: 1px solid rgba(74, 222, 128, 0.2); }
        .status-fuera { background: rgba(248, 113, 113, 0.1); color: var(--red-soft); border: 1px solid rgba(248, 113, 113, 0.2); }

        .modal-content { background: var(--card-bg); border-radius: 25px; border: none; color: var(--text-main); }
    </style>
</head>
<body>

<div class="container-fluid">
    <header class="app-header">
        <div class="logo-section">
            <img src="logo-icono.png" alt="Logo" class="logo-img" onerror="this.style.visibility='hidden'">
            <h1 class="app-title">Monitor de Vaciado</h1>
        </div>
        <div class="sync-info">
            <span id="syncTime">Sincronizando...</span>
        </div>
    </header>

    <div class="data-card">
        <div class="card-header">
            <span class="indicator-label">PPM (30-60)</span>
            <div id="status_ppm"></div>
        </div>
        <div id="chart_ppm" style="height: 85%; width: 100%;"></div>
    </div>

    <div class="data-card">
        <div class="card-header">
            <span class="indicator-label">ORP (750-850)</span>
            <div id="status_orp"></div>
        </div>
        <div id="chart_orp" style="height: 85%; width: 100%;"></div>
    </div>

    <div class="data-card">
        <div class="card-header">
            <span class="indicator-label">PH (6.5-7.5)</span>
            <div id="status_ph"></div>
        </div>
        <div id="chart_ph" style="height: 85%; width: 100%;"></div>
    </div>
</div>

<div class="modal fade" id="fotoModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h6 class="modal-title fw-bold">Registro Detallado</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center p-4">
        <img id="imgRegistro" src="" class="img-fluid rounded-4 mb-3 shadow">
        <div id="infoRegistro" class="p-3 rounded-4 small" style="background: rgba(0,0,0,0.2); color: var(--accent-soft);"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxWr-OYFzfjzwGOZzYkMAfyI-yShxOrd6qtpK_PGgSr5teU7AgeVL1pOEkH5F9zRhlUdw/exec?pestana=Vaciado";
    const LIMITS = { ppm: [30, 60], orp: [750, 850], ph: [6.5, 7.5] };

    let charts = {};

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(refresh);
    setInterval(refresh, 30000);

    function refresh() {
        fetch(WEB_APP_URL + "&t=" + new Date().getTime())
        .then(r => r.json())
        .then(res => {
            if (res.error) {
                document.getElementById('syncTime').innerText = "Reintentando...";
                return;
            }

            const hoy = new Date().setHours(0,0,0,0);
            const rawData = res.slice(1).filter(f => {
                if(!f[0]) return false;
                const fechaFila = new Date(f[0]).setHours(0,0,0,0);
                return fechaFila === hoy;
            });

            if (rawData.length === 0) {
                document.getElementById('syncTime').innerText = "Hoy sin datos";
            } else {
                document.getElementById('syncTime').innerText = "Act: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                drawChart(rawData, 'chart_ppm', 'status_ppm', LIMITS.ppm, '#38bdf8', 2, '#');
                drawChart(rawData, 'chart_orp', 'status_orp', LIMITS.orp, '#fb923c', 3, '#');
                drawChart(rawData, 'chart_ph', 'status_ph', LIMITS.ph, '#4ade80', 4, '#.0');
            }
        })
        .catch(err => {
            document.getElementById('syncTime').innerText = "Error de Red";
        });
    }

    function drawChart(data, divId, statusId, range, baseColor, colIdx, format) {
        let dt = new google.visualization.DataTable();
        dt.addColumn('string', 'X');
        dt.addColumn('number', 'Valor');
        dt.addColumn({type: 'string', role: 'style'});
        dt.addColumn({type: 'string', role: 'annotation'});
        dt.addColumn('number', 'Min');
        dt.addColumn('number', 'Max');

        let minVal = range[0], maxVal = range[1];

        data.forEach(f => {
            let h = new Date(f[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            let val = Number(f[colIdx]);
            let kilos = f[5] ? f[5] + "k" : ""; 
            
            if(val < minVal) minVal = val;
            if(val > maxVal) maxVal = val;
            
            let fuera = (val < range[0] || val > range[1]);
            let estilo = fuera ? 'point { size: 7; fill-color: #f87171; }' : 'point { size: 5; fill-color: ' + baseColor + '; }';
            
            dt.addRow([h + "\n" + kilos, val, estilo, f[6] === "SI" ? "MOD" : null, range[0], range[1]]);
        });

        const padding = (range[1] - range[0]) * 0.5;
        const vMin = Math.min(range[0], minVal) - padding;
        const vMax = Math.max(range[1], maxVal) + padding;

        if (!charts[divId]) {
            charts[divId] = new google.visualization.ComboChart(document.getElementById(divId));
            google.visualization.events.addListener(charts[divId], 'select', function() {
                let sel = charts[divId].getSelection()[0];
                if (sel && sel.row !== null) {
                    let registro = data[sel.row];
                    if (registro[7] && registro[7] !== "Sin foto") {
                        document.getElementById('imgRegistro').src = registro[7];
                        document.getElementById('infoRegistro').innerText = `Op: ${registro[1]} | ${registro[5]} KG | ${new Date(registro[0]).toLocaleTimeString()}`;
                        new bootstrap.Modal(document.getElementById('fotoModal')).show();
                    }
                }
            });
        }

        charts[divId].draw(dt, {
            backgroundColor: 'transparent', 
            legend: 'none',
            chartArea: { width: '90%', height: '70%', top: 10, left: 45, right: 10, bottom: 50 },
            animation: { duration: 500, easing: 'out', startup: true },
            hAxis: { textStyle: { color: '#64748b', fontSize: 9 }, gridlines: { color: 'transparent' } },
            vAxis: { 
                textStyle: { color: '#94a3b8', fontSize: 10 }, 
                gridlines: { color: '#334155' },
                viewWindow: { min: vMin, max: vMax },
                ticks: [range[0], range[1]],
                format: format
            },
            series: { 
                0: { color: baseColor, lineWidth: 3, pointsVisible: true, type: 'line' }, 
                1: { color: '#475569', lineDashStyle: [4, 4], lineWidth: 2, pointSize: 0 }, 
                2: { color: '#475569', lineDashStyle: [4, 4], lineWidth: 2, pointSize: 0 } 
            },
            annotations: { textStyle: { fontSize: 9, color: '#f87171', bold: true }, alwaysOutside: true }
        });

        const ultimoVal = Number(data[data.length-1][colIdx]);
        const isOk = !(ultimoVal < range[0] || ultimoVal > range[1]);
        document.getElementById(statusId).innerHTML = isOk ? 
            '<span class="status-badge status-normal">Normal</span>' : 
            '<span class="status-badge status-fuera">Revisar</span>';
    }
</script>
</body>
</html>
