<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Vaciado</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root {
            --bg-app: #111827;
            --card-bg: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-soft: #60a5fa;
            --green-soft: #34d399;
            --red-soft: #f87171;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            margin: 0;
            padding: 15px;
            overflow: hidden;
        }

        /* Cabecera limpia */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
            margin-bottom: 15px;
        }

        .app-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
        }

        .sync-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 5px 15px;
            border-radius: 50px;
        }

        /* Tarjetas amigables */
        .data-card {
            background: var(--card-bg);
            border-radius: 28px; /* Bordes muy redondeados */
            padding: 20px;
            height: 28vh;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .indicator-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Etiquetas de estado amigables */
        .status-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 50px;
            text-transform: capitalize;
        }
        .status-normal { background: rgba(52, 211, 153, 0.15); color: var(--green-soft); }
        .status-fuera { background: rgba(248, 113, 113, 0.15); color: var(--red-soft); }

        /* Modales */
        .modal-content { 
            background: var(--card-bg); 
            border-radius: 30px; 
            border: none; 
            color: var(--text-main);
        }
        
        #sync-spinner { font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container-fluid">
    <header class="app-header">
        <div>
            <h1 class="app-title">Monitor de Vaciado</h1>
            <span style="font-size: 0.7rem; color: var(--accent-soft); font-weight: 500;">Actualización automática activa</span>
        </div>
        <div class="sync-info">
            <i class="bi bi-arrow-clockwise me-1" id="sync-spinner"></i>
            <span id="syncTime">Sincronizando...</span>
        </div>
    </header>

    <div class="data-card">
        <div class="card-header">
            <span class="indicator-label">Cloro (PPM)</span>
            <div id="status_ppm"></div>
        </div>
        <div id="chart_ppm" style="height: 85%; width: 100%;"></div>
    </div>

    <div class="data-card">
        <div class="card-header">
            <span class="indicator-label">Potencial (ORP)</span>
            <div id="status_orp"></div>
        </div>
        <div id="chart_orp" style="height: 85%; width: 100%;"></div>
    </div>

    <div class="data-card">
        <div class="card-header">
            <span class="indicator-label">Acidez (PH)</span>
            <div id="status_ph"></div>
        </div>
        <div id="chart_ph" style="height: 85%; width: 100%;"></div>
    </div>
</div>

<div class="modal fade" id="fotoModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h6 class="modal-title fw-bold">Detalle del Registro</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center p-4">
        <img id="imgRegistro" src="" class="img-fluid rounded-4 mb-3" style="box-shadow: 0 5px 15px rgba(0,0,0,0.4);">
        <div id="infoRegistro" class="p-3 rounded-4 small" style="background: rgba(0,0,0,0.2); color: var(--accent-soft);"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-yUjvbrg_XxbnkfDrn7jR9EwQaoB5LSov-PovhPrhxumg0OdLGV7rxnZFtbSQZy1u9g/exec?pestana=Vaciado";
    const LIMITS = { ppm: [30, 60], orp: [750, 850], ph: [6.5, 7.5] };

    let charts = {};

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(refresh);
    setInterval(refresh, 30000);

    function refresh() {
        fetch(WEB_APP_URL + "&t=" + new Date().getTime())
        .then(r => r.json())
        .then(res => {
            if (res.error) {
                document.getElementById('syncTime').innerText = "Reintentando...";
                return;
            }

            const hoy = new Date().setHours(0,0,0,0);
            const rawData = res.slice(1).filter(f => {
                if(!f[0]) return false;
                const fechaFila = new Date(f[0]).setHours(0,0,0,0);
                return fechaFila === hoy;
            });

            if (rawData.length === 0) {
                document.getElementById('syncTime').innerText = "Hoy sin registros";
            } else {
                document.getElementById('syncTime').innerText = "Actualizado: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                drawChart(rawData, 'chart_ppm', 'status_ppm', LIMITS.ppm, '#60a5fa', 2, '#');
                drawChart(rawData, 'chart_orp', 'status_orp', LIMITS.orp, '#fb923c', 3, '#');
                drawChart(rawData, 'chart_ph', 'status_ph', LIMITS.ph, '#34d399', 4, '#.0');
            }
        })
        .catch(err => {
            document.getElementById('syncTime').innerText = "Error de conexión";
        });
    }

    function drawChart(data, divId, statusId, range, baseColor, colIdx, format) {
        let dt = new google.visualization.DataTable();
        dt.addColumn('string', 'X');
        dt.addColumn('number', 'Valor');
        dt.addColumn({type: 'string', role: 'style'});
        dt.addColumn({type: 'string', role: 'annotation'});
        dt.addColumn('number', 'Min');
        dt.addColumn('number', 'Max');

        let minVal = range[0], maxVal = range[1];

        data.forEach(f => {
            let h = new Date(f[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            let val = Number(f[colIdx]);
            if(val < minVal) minVal = val;
            if(val > maxVal) maxVal = val;
            let fuera = (val < range[0] || val > range[1]);
            // Estilo de puntos más suave
            let estilo = fuera ? 'point { size: 6; fill-color: #f87171; }' : 'point { size: 4; fill-color: ' + baseColor + '; }';
            dt.addRow([h, val, estilo, f[6] === "SI" ? "✔" : null, range[0], range[1]]);
        });

        const padding = (range[1] - range[0]) * 0.4;
        const vMin = Math.min(range[0], minVal) - padding;
        const vMax = Math.max(range[1], maxVal) + padding;

        if (!charts[divId]) {
            charts[divId] = new google.visualization.ComboChart(document.getElementById(divId));
            google.visualization.events.addListener(charts[divId], 'select', function() {
                let sel = charts[divId].getSelection()[0];
                if (sel && sel.row !== null) {
                    let registro = data[sel.row];
                    if (registro[7] && registro[7] !== "Sin foto") {
                        document.getElementById('imgRegistro').src = registro[7];
                        document.getElementById('infoRegistro').innerText = `Operador: ${registro[1]} • ${registro[5]} KG • ${new Date(registro[0]).toLocaleTimeString()}`;
                        new bootstrap.Modal(document.getElementById('fotoModal')).show();
                    }
                }
            });
        }

        charts[divId].draw(dt, {
            backgroundColor: 'transparent', 
            legend: 'none',
            chartArea: { width: '92%', height: '80%', top: 10, left: 45, right: 10, bottom: 35 },
            animation: { duration: 800, easing: 'out', startup: true },
            hAxis: { textStyle: { color: '#6b7280', fontSize: 10 }, gridlines: { color: 'transparent' } },
            vAxis: { 
                textStyle: { color: '#9ca3af', fontSize: 10 }, 
                gridlines: { color: 'rgba(255,255,255,0.05)' },
                viewWindow: { min: vMin, max: vMax },
                ticks: [range[0], range[1]],
                format: format
            },
            series: { 
                0: { color: baseColor, lineWidth: 3, pointsVisible: true, type: 'line', curveType: 'function' }, 
                1: { color: 'rgba(255,255,255,0.1)', lineDashStyle: [4, 4], lineWidth: 1, pointSize: 0 }, 
                2: { color: 'rgba(255,255,255,0.1)', lineDashStyle: [4, 4], lineWidth: 1, pointSize: 0 } 
            },
            annotations: { textStyle: { fontSize: 10, color: '#f87171', bold: true }, alwaysOutside: true }
        });

        const ultimoVal = Number(data[data.length-1][colIdx]);
        const isOk = !(ultimoVal < range[0] || ultimoVal > range[1]);
        document.getElementById(statusId).innerHTML = isOk ? 
            '<span class="status-badge status-normal"><i class="bi bi-check2 me-1"></i>Normal</span>' : 
            '<span class="status-badge status-fuera"><i class="bi bi-exclamation-circle me-1"></i>Revisar</span>';
    }
</script>
</body>
</html>
