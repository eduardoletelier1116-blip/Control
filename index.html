<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso de Datos - Estanque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; max-width: 450px; margin: auto; }
        .btn-success { padding: 15px; font-weight: bold; font-size: 1.1rem; }
        label { font-weight: bold; color: #555; }
    </style>
</head>
<body>
<div class="container">
    <div class="text-center mb-4">
        <h2>🍎 Registro Operativo 🍒</h2>
        <p class="text-muted">Ingresa los valores del estanque</p>
    </div>
    <div class="card p-4">
        <form id="formControl">
            <div class="mb-3">
                <label>Operador</label>
                <input type="text" id="operador" class="form-control" placeholder="Nombre" required>
            </div>
            <div class="row">
                <div class="col-6 mb-3"><label>PPM</label><input type="number" id="ppm" class="form-control" step="0.1" required></div>
                <div class="col-6 mb-3"><label>ORP</label><input type="number" id="orp" class="form-control" required></div>
            </div>
            <div class="row">
                <div class="col-6 mb-3"><label>PH</label><input type="number" id="ph" class="form-control" step="0.1" required></div>
                <div class="col-6 mb-3"><label>Kilos</label><input type="number" id="kilos" class="form-control" required></div>
            </div>
            <button type="submit" id="btnEnviar" class="btn btn-success w-100 mt-2">GUARDAR DATOS</button>
        </form>
    </div>
    <div id="mensaje" class="alert alert-success mt-3 d-none text-center">✅ ¡Datos enviados al monitor!</div>
</div>

<script>
    const WEB_APP_URL = "TU_URL_DE_APPS_SCRIPT_AQUI";
    document.getElementById('formControl').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true; btn.innerText = "Enviando...";
        const datos = {
            operador: document.getElementById('operador').value,
            ppm: parseFloat(document.getElementById('ppm').value),
            orp: parseInt(document.getElementById('orp').value),
            ph: parseFloat(document.getElementById('ph').value),
            kilos: parseInt(document.getElementById('kilos').value)
        };
        fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
        .then(() => {
            document.getElementById('mensaje').classList.remove('d-none');
            document.getElementById('formControl').reset();
            setTimeout(() => { document.getElementById('mensaje').classList.add('d-none'); }, 3000);
        })
        .finally(() => { btn.disabled = false; btn.innerText = "GUARDAR DATOS"; });
    });
</script>
</body>
</html>
