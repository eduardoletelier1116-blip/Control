<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro con Respaldo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; max-width: 450px; margin: auto; }
        .btn-success { padding: 12px; font-weight: bold; }
        .form-check-input:checked { background-color: #dc3545; border-color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h2 class="fw-bold">🍎 Registro de Turno 🍒</h2>
    </div>

    <div class="card p-4">
        <form id="formControl">
            <div class="mb-3">
                <label class="form-label fw-bold small">OPERADOR</label>
                <input type="text" id="operador" class="form-control" placeholder="Nombre" required>
            </div>

            <div class="form-check form-switch mb-3 p-3 bg-light rounded border d-flex align-items-center">
                <input class="form-check-input ms-0 me-3" type="checkbox" id="esCorreccion" style="width: 2.5em; height: 1.2em;">
                <label class="form-check-label fw-bold" for="esCorreccion">CORRECCIÓN MANUAL</label>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small">FOTO DE RESPALDO</label>
                <input type="file" id="fotoInput" class="form-control" accept="image/*" capture="environment">
            </div>

            <div class="row g-2">
                <div class="col-6 mb-3"><label class="fw-bold small">PPM</label><input type="number" id="ppm" class="form-control" step="0.1" required></div>
                <div class="col-6 mb-3"><label class="fw-bold small">ORP</label><input type="number" id="orp" class="form-control" required></div>
                <div class="col-6 mb-3"><label class="fw-bold small">PH</label><input type="number" id="ph" class="form-control" step="0.1" required></div>
                <div class="col-6 mb-3"><label class="fw-bold small">KILOS</label><input type="number" id="kilos" class="form-control" required></div>
            </div>

            <button type="submit" id="btnEnviar" class="btn btn-success w-100 mt-2">GUARDAR REGISTRO</button>
        </form>
    </div>
    <div id="mensaje" class="alert alert-success mt-3 d-none text-center fw-bold">✅ Registro enviado</div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzhomfhpm3dTmoW9h1r-z9jLhxWUHdNM7lOsMlQaCQofHCKSE9kTeLk2B_C2DMKpEx_/exec";

    document.getElementById('formControl').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const fotoFile = document.getElementById('fotoInput').files[0];
        btn.disabled = true;
        btn.innerText = "Subiendo datos y foto...";

        if (fotoFile) {
            const reader = new FileReader();
            reader.onloadend = () => enviarDatos(reader.result);
            reader.readAsDataURL(fotoFile);
        } else {
            enviarDatos(null);
        }
    });

    function enviarDatos(fotoBase64) {
        const datos = {
            operador: document.getElementById('operador').value,
            ppm: parseFloat(document.getElementById('ppm').value),
            orp: parseInt(document.getElementById('orp').value),
            ph: parseFloat(document.getElementById('ph').value),
            kilos: parseInt(document.getElementById('kilos').value),
            correccion: document.getElementById('esCorreccion').checked,
            foto: fotoBase64
        };

        fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
        .then(() => {
            document.getElementById('mensaje').classList.remove('d-none');
            document.getElementById('formControl').reset();
            setTimeout(() => { document.getElementById('mensaje').classList.add('d-none'); }, 3000);
        })
        .finally(() => {
            const btn = document.getElementById('btnEnviar');
            btn.disabled = false;
            btn.innerText = "GUARDAR REGISTRO";
        });
    }
</script>
</body>
</html>
