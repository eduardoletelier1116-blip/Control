<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Estanque - Manzanas/Cerezas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 30px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; }
        .btn-success { background-color: #28a745; border: none; padding: 12px; font-weight: bold; }
        .header-logo { color: #d63031; font-weight: bold; text-align: center; margin-bottom: 20px; }
        label { font-weight: 500; color: #495057; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="header-logo">
                <h2>🍎 Control de Calidad 🍒</h2>
                <p class="text-muted">Registro de Estanque de Vaciado</p>
            </div>
            
            <div class="card p-4">
                <form id="formControl">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Operador</label>
                        <input type="text" id="operador" class="form-control" placeholder="Ej: Juan Pérez" required>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">PPM (30-60)</label>
                            <input type="number" id="ppm" class="form-control" step="0.1" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">ORP (750-850)</label>
                            <input type="number" id="orp" class="form-control" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">PH (6.5-7.5)</label>
                            <input type="number" id="ph" class="form-control" step="0.1" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Kilos Procesados</label>
                            <input type="number" id="kilos" class="form-control" required>
                        </div>
                    </div>

                    <button type="submit" id="btnEnviar" class="btn btn-success w-100 mt-3">
                        GUARDAR REGISTRO
                    </button>
                </form>
            </div>
            <div id="mensajeExito" class="alert alert-success mt-3 d-none">
                ¡Datos guardados y sincronizados correctamente!
            </div>
        </div>
    </div>
</div>

<script>
    // --- IMPORTANTE: PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwIjU3nytb7tiQ8M7QjK1g2hA_-bg1P-s5zzgv9BzGhcO4Ojc9WGrGJWHIalkb21ljlNw/exec";

    document.getElementById('formControl').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnEnviar');
        const alerta = document.getElementById('mensajeExito');
        
        // Deshabilitar botón para evitar doble clic
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const datos = {
            operador: document.getElementById('operador').value,
            ppm: parseFloat(document.getElementById('ppm').value),
            orp: parseInt(document.getElementById('orp').value),
            ph: parseFloat(document.getElementById('ph').value),
            kilos: parseInt(document.getElementById('kilos').value)
        };

        // Enviar datos a Google Sheets
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Evita problemas de seguridad de navegadores
            cache: 'no-cache',
            body: JSON.stringify(datos)
        })
        .then(() => {
            alerta.classList.remove('d-none');
            document.getElementById('formControl').reset();
            setTimeout(() => { alerta.classList.add('d-none'); }, 5000);
        })
        .catch(error => {
            alert("Error al enviar datos: " + error);
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "GUARDAR REGISTRO";
        });
    });
</script>

</body>
</html>
