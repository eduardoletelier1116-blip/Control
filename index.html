<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control Industrial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .main-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .logo-main {
            height: 80px;
            margin-bottom: 20px;
        }

        .menu-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: scale(1.03);
            border-color: #58a6ff;
            background: #1c2128;
            color: #58a6ff;
        }

        .icon-box {
            font-size: 2.5rem;
            margin-right: 20px;
        }

        .text-box {
            text-align: left;
        }

        .text-box h3 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .text-box p {
            margin: 0;
            font-size: 0.85rem;
            color: #8b949e;
        }

        .footer-info {
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <img src="logo-icono.png" alt="Logo Empresa" class="logo-main" onerror="this.style.display='none'">
    <h2 class="mb-4 fw-bold">SISTEMA DE GESTIÓN</h2>
    
    <a href="vaciado_app.html" class="menu-card">
        <div class="icon-box text-success">
            <i class="bi bi-droplet-fill"></i>
        </div>
        <div class="text-box">
            <h3>VACIADO</h3>
            <p>PPM, ORP, pH y Kilos</p>
        </div>
    </a>

    <a href="frigo_app.html" class="menu-card">
        <div class="icon-box text-primary">
            <i class="bi bi-snow"></i>
        </div>
        <div class="text-box">
            <h3>FRIGORÍFICO</h3>
            <p>Control de Temperaturas</p>
        </div>
    </a>

    <div class="footer-info">
        <p>© 2026 Planta Industrial - Control Interno</p>
    </div>
</div>

</body>
</html>
