<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Control de Estanque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; max-width: 500px; margin: auto; }
        .btn-success { padding: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container text-center">
    <h2 class="mb-3">🍎 Registro de Estanque 🍒</h2>
    
    <div class="mb-4">
        <a href="graficos.html" class="btn btn-primary w-100" style="max-width: 500px;">📈 VER VARIACIONES DEL DÍA</a>
    </div>

    <div class="card p-4 text-start">
        <form id="formControl">
            <div class="mb-3">
                <label class="form-label">Operador</label>
                <input type="text" id="operador" class="form-control" required>
            </div>
            <div class="row">
                <div class="col-6 mb-3"><label>PPM (30-60)</label><input type="number" id="ppm" class="form-control" step="0.1" required></div>
                <div class="col-6 mb-3"><label>ORP (750-850)</label><input type="number" id="orp" class="form-control" required></div>
            </div>
            <div class="row">
                <div class="col-6 mb-3"><label>PH (6.5-7.5)</label><input type="number" id="ph" class="form-control" step="0.1" required></div>
                <div class="col-6 mb-3"><label>Kilos</label><input type="number" id="kilos" class="form-control" required></div>
            </div>
            <button type="submit" id="btnEnviar" class="btn btn-success w-100 mt-2">GUARDAR REGISTRO</button>
        </form>
    </div>
    <div id="mensaje" class="alert alert-success mt-3 d-none" style="max-width: 500px; margin: 15px auto;">✅ ¡Guardado con éxito!</div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLJDQ1KOM0c-9ikGk8vzeiz3Flqy7ERL4SUckABpEYK3_902vUvboTTfqbwF2XFlfn-g/exec";

    document.getElementById('formControl').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const datos = {
            operador: document.getElementById('operador').value,
            ppm: parseFloat(document.getElementById('ppm').value),
            orp: parseInt(document.getElementById('orp').value),
            ph: parseFloat(document.getElementById('ph').value),
            kilos: parseInt(document.getElementById('kilos').value)
        };

        fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
        .then(() => {
            document.getElementById('mensaje').classList.remove('d-none');
            document.getElementById('formControl').reset();
            setTimeout(() => { document.getElementById('mensaje').classList.add('d-none'); }, 4000);
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "GUARDAR REGISTRO";
        });
    });
</script>
</body>
</html>
