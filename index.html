<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Parámetros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { background-color: #f0f2f5; padding: 15px; }
        .card-grafico { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            margin-bottom: 25px; 
            border-left: 5px solid;
        }
        .color-ppm { border-left-color: #3498db; }
        .color-orp { border-left-color: #e67e22; }
        .color-ph { border-left-color: #2ecc71; }
        h4 { font-size: 1.1rem; color: #444; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="mb-3 text-start">
        <a href="index.html" class="btn btn-outline-secondary btn-sm">⬅ Volver al Registro</a>
    </div>
    <h3 class="mb-4">Panel de Monitoreo</h3>

    <div class="card-grafico color-ppm">
        <h4>Tendencia PPM (Rango: 30 - 60)</h4>
        <div id="chart_ppm" style="width: 100%; height: 250px;">Cargando...</div>
    </div>

    <div class="card-grafico color-orp">
        <h4>Tendencia ORP (Rango: 750 - 850)</h4>
        <div id="chart_orp" style="width: 100%; height: 250px;">Cargando...</div>
    </div>

    <div class="card-grafico color-ph">
        <h4>Tendencia PH (Rango: 6.5 - 7.5)</h4>
        <div id="chart_ph" style="width: 100%; height: 250px;">Cargando...</div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLJDQ1KOM0c-9ikGk8vzeiz3Flqy7ERL4SUckABpEYK3_902vUvboTTfqbwF2XFlfn-g/exec";

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(dibujarTodo);

    function dibujarTodo() {
        fetch(WEB_APP_URL)
        .then(r => r.json())
        .then(res => {
            const filas = res.slice(1).slice(-15); // Últimos 15 datos
            
            // Preparar datos para cada gráfico
            let dataPPM = [["Hora", "PPM"]];
            let dataORP = [["Hora", "ORP"]];
            let dataPH = [["Hora", "PH"]];

            filas.forEach(f => {
                let h = new Date(f[0]);
                let label = h.getHours() + ":" + (h.getMinutes() < 10 ? '0' : '') + h.getMinutes();
                dataPPM.push([label, f[2]]);
                dataORP.push([label, f[3]]);
                dataPH.push([label, f[4]]);
            });

            // Opciones comunes
            const optionsBase = {
                curveType: 'function',
                legend: { position: 'none' },
                chartArea: { width: '85%', height: '70%' },
                hAxis: { textStyle: { fontSize: 10 } }
            };

            // Dibujar PPM
            new google.visualization.LineChart(document.getElementById('chart_ppm'))
                .draw(google.visualization.arrayToDataTable(dataPPM), {...optionsBase, colors: ['#3498db']});

            // Dibujar ORP
            new google.visualization.LineChart(document.getElementById('chart_orp'))
                .draw(google.visualization.arrayToDataTable(dataORP), {...optionsBase, colors: ['#e67e22']});

            // Dibujar PH
            new google.visualization.LineChart(document.getElementById('chart_ph'))
                .draw(google.visualization.arrayToDataTable(dataPH), {...optionsBase, colors: ['#2ecc71']});
        });
    }
</script>
</body>
</html>
