<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Central - Monitoreo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .chart-card { background: #151515; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #222; }
        h2 { font-weight: 800; letter-spacing: 2px; }
        .status-box { padding: 5px 15px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; }
        .alerta-activa { background-color: #721c24; color: #f8d7da; border: 1px solid #f5c6cb; animation: blink 2s infinite; }
        .estado-normal { background-color: #155724; color: #d4edda; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="text-center mb-4">
        <h2>MONITOREO DE CALIDAD <span id="fechaLabel" style="font-size: 1rem; color: #444;"></span></h2>
        <div id="lastSync" style="font-size: 0.7rem; color: #555;">Sincronizando...</div>
    </div>

    <div class="row">
        <div class="col-12 mb-4">
            <div class="chart-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0" style="color: #3498db;">PPM (30 - 60)</h5>
                    <div id="status_ppm" class="status-box">Cargando...</div>
                </div>
                <div id="chart_ppm" style="height: 220px;"></div>
            </div>
        </div>
        <div class="col-12 mb-4">
            <div class="chart-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0" style="color: #e67e22;">ORP (750 - 850)</h5>
                    <div id="status_orp" class="status-box">Cargando...</div>
                </div>
                <div id="chart_orp" style="height: 220px;"></div>
            </div>
        </div>
        <div class="col-12 mb-4">
            <div class="chart-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0" style="color: #2ecc71;">PH (6.5 - 7.5)</h5>
                    <div id="status_ph" class="status-box">Cargando...</div>
                </div>
                <div id="chart_ph" style="height: 220px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzvMblUnsikPSaGe_VpQVSIYHxrvFfoLiK-cgaY7iTWYnilk2djGQZS_OTtUYkQUhQrVw/exec";
    const LIMITES = { ppm: [30, 60], orp: [750, 850], ph: [6.5, 7.5] };

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(actualizar);
    setInterval(actualizar, 30000);

    function actualizar() {
        document.getElementById('fechaLabel').innerText = " | " + new Date().toLocaleDateString();
        fetch(WEB_APP_URL).then(r => r.json()).then(res => {
            const hoy = new Date().setHours(0,0,0,0);
            const dataHoy = res.slice(1).filter(f => new Date(f[0]).setHours(0,0,0,0) === hoy);
            
            document.getElementById('lastSync').innerText = "ÚLTIMA ACTUALIZACIÓN: " + new Date().toLocaleTimeString();

            dibujarGrafico(dataHoy, 'ppm', 'chart_ppm', 'status_ppm', LIMITES.ppm, '#3498db', 2);
            dibujarGrafico(dataHoy, 'orp', 'chart_orp', 'status_orp', LIMITES.orp, '#e67e22', 3);
            dibujarGrafico(dataHoy, 'ph', 'chart_ph', 'status_ph', LIMITES.ph, '#2ecc71', 4);
        });
    }

    function dibujarGrafico(datos, key, divId, statusId, rango, colorBase, colIdx) {
        if (datos.length === 0) return;

        let dataTable = new google.visualization.DataTable();
        dataTable.addColumn('string', 'H');
        dataTable.addColumn('number', 'Valor');
        dataTable.addColumn({type: 'string', role: 'style'});
        dataTable.addColumn({type: 'string', role: 'annotation'});
        dataTable.addColumn('number', 'Min');
        dataTable.addColumn('number', 'Max');

        const ultimo = datos[datos.length - 1];
        const valorActual = ultimo[colIdx];
        const fueraRango = (valorActual < rango[0] || valorActual > rango[1]);

        datos.forEach(f => {
            let h = new Date(f[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            let val = f[colIdx];
            let esCorr = f[6] === "SI"; // Columna de corrección
            let kilos = f[5];
            
            let fuera = (val < rango[0] || val > rango[1]);
            let estilo = fuera ? 'point { size: 7; fill-color: #ff3b3b; }' : 'point { size: 4; fill-color: ' + colorBase + '; }';
            let etiqueta = esCorr ? "C" : null;
            
            dataTable.addRow([h + "\n(" + kilos + ")", val, estilo, etiqueta, rango[0], rango[1]]);
        });

        const statusDiv = document.getElementById(statusId);
        if (fueraRango) {
            statusDiv.className = "status-box alerta-activa";
            statusDiv.innerText = "⚠️ FUERA DE RANGO";
        } else {
            statusDiv.className = "status-box estado-normal";
            statusDiv.innerText = "✅ NORMAL";
        }

        const options = {
            backgroundColor: 'transparent', legend: 'none',
            chartArea: { width: '92%', height: '75%' },
            hAxis: { textStyle: { color: '#555', fontSize: 9 } },
            vAxis: { textStyle: { color: '#888' }, gridlines: { color: '#222' } },
            series: {
                0: { color: colorBase, lineWidth: 2 },
                1: { color: '#333', lineWidth: 1, lineDashStyle: [2, 2] },
                2: { color: '#333', lineWidth: 1, lineDashStyle: [2, 2] }
            },
            annotations: { textStyle: { fontSize: 10, color: '#fff', bold: true } }
        };

        new google.visualization.ComboChart(document.getElementById(divId)).draw(dataTable, options);
    }
</script>
</body>
</html>
