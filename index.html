<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficos - Variaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .chart-container { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="mb-3 text-start">
        <a href="index.html" class="btn btn-outline-secondary">⬅ Volver al Registro</a>
    </div>
    <h3 class="mb-4">Tendencias del Día</h3>

    <div class="chart-container">
        <div id="chart_div" style="width: 100%; height: 450px;">Cargando datos...</div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLJDQ1KOM0c-9ikGk8vzeiz3Flqy7ERL4SUckABpEYK3_902vUvboTTfqbwF2XFlfn-g/exec";

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(dibujar);

    function dibujar() {
        fetch(WEB_APP_URL)
        .then(r => r.json())
        .then(res => {
            const dataRows = [["Hora", "PPM", "ORP", "PH"]];
            // Tomamos los últimos 15 registros para el gráfico
            const filas = res.slice(1).slice(-15); 

            filas.forEach(f => {
                let h = new Date(f[0]);
                let etiqueta = h.getHours() + ":" + (h.getMinutes() < 10 ? '0' : '') + h.getMinutes();
                dataRows.push([etiqueta, f[2], f[3], f[4]]);
            });

            const data = google.visualization.arrayToDataTable(dataRows);
            const options = {
                curveType: 'function',
                legend: { position: 'bottom' },
                vAxes: { 0: {title: 'PPM / PH'}, 1: {title: 'ORP'} },
                series: { 0: {targetAxisIndex: 0}, 1: {targetAxisIndex: 1}, 2: {targetAxisIndex: 0} },
                colors: ['#3498db', '#e67e22', '#2ecc71']
            };

            const chart = new google.visualization.LineChart(document.getElementById('chart_div'));
            chart.draw(data, options);
        });
    }
</script>
</body>
</html>
