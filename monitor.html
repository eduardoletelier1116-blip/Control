<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRO DE CONTROL - Monitoreo en Vivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; padding: 20px; }
        .card-grafico { background: #2d2d2d; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #444; }
        h5 { color: #aaa; font-size: 0.8rem; letter-spacing: 1px; }
        .status-bar { background: #333; padding: 5px 15px; border-radius: 50px; display: inline-block; font-size: 0.7rem; color: #00ff00; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container-fluid text-center">
    <div class="status-bar">● MONITOREO EN VIVO - SE ACTUALIZA CADA 30 SEG</div>
    <h2 class="mb-4">PANEL DE CONTROL INDUSTRIAL</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="card-grafico">
                <h5>PPM (30 - 60)</h5>
                <div id="chart_ppm" style="height: 300px;"></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-grafico">
                <h5>ORP (750 - 850)</h5>
                <div id="chart_orp" style="height: 300px;"></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-grafico">
                <h5>PH (6.5 - 7.5)</h5>
                <div id="chart_ph" style="height: 300px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLJDQ1KOM0c-9ikGk8vzeiz3Flqy7ERL4SUckABpEYK3_902vUvboTTfqbwF2XFlfn-g/exec";
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(cargarDatos);

    // Actualizar automáticamente cada 30 segundos
    setInterval(cargarDatos, 30000);

    function cargarDatos() {
        fetch(WEB_APP_URL)
        .then(r => r.json())
        .then(res => {
            const filas = res.slice(1).slice(-20); 
            let dPPM = [["H", "PPM"]], dORP = [["H", "ORP"]], dPH = [["H", "PH"]];

            filas.forEach(f => {
                let h = new Date(f[0]).getHours() + ":" + (new Date(f[0]).getMinutes() < 10 ? '0' : '') + new Date(f[0]).getMinutes();
                dPPM.push([h, f[2]]); dORP.push([h, f[3]]); dPH.push([h, f[4]]);
            });

            const opt = { 
                backgroundColor: 'transparent',
                legend: 'none',
                hAxis: { textStyle: {color: '#888'}, gridlines: {color: '#333'} },
                vAxis: { textStyle: {color: '#888'}, gridlines: {color: '#333'} },
                chartArea: {width:'85%', height:'80%'}
            };

            new google.visualization.LineChart(document.getElementById('chart_ppm')).draw(google.visualization.arrayToDataTable(dPPM), {...opt, colors:['#3498db']});
            new google.visualization.LineChart(document.getElementById('chart_orp')).draw(google.visualization.arrayToDataTable(dORP), {...opt, colors:['#e67e22']});
            new google.visualization.LineChart(document.getElementById('chart_ph')).draw(google.visualization.arrayToDataTable(dPH), {...opt, colors:['#2ecc71']});
        });
    }
</script>
</body>
</html>
