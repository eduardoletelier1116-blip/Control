<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Industrial Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            padding: 5px; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .header-bar {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-zone { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 30px; width: auto; }

        .chart-card { 
            background: var(--card-bg); 
            border-radius: 10px; 
            padding: 10px; 
            border: 1px solid var(--border-color); 
            height: 29vh; 
            margin-bottom: 1vh; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .chart-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }

        .status-pill { 
            padding: 3px 10px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            font-weight: 800;
        }

        .bg-danger-live { background-color: #f85149; color: #fff; animation: blink 1.2s infinite; }
        .bg-success-live { background-color: #238636; color: #fff; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .modal-content { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="header-bar">
        <div class="brand-zone">
            <img src="logo-icono.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
            <h6 class="mb-0 fw-bold text-white">MONITOREO DE VACIADO</h6>
        </div>
        <div id="syncTime" style="color: var(--text-dim); font-size: 0.75rem; font-family: monospace;">SINCRONIZANDO...</div>
    </div>

    <div class="chart-card">
        <div class="d-flex justify-content-between align-items-center mb-0">
            <span class="chart-title" style="color: #58a6ff;">PPM (30-60)</span>
            <div id="status_ppm"></div>
        </div>
        <div id="chart_ppm" style="height: 90%; width: 100%;"></div>
    </div>

    <div class="chart-card">
        <div class="d-flex justify-content-between align-items-center mb-0">
            <span class="chart-title" style="color: #ffa657;">ORP (750-850)</span>
            <div id="status_orp"></div>
        </div>
        <div id="chart_orp" style="height: 90%; width: 100%;"></div>
    </div>

    <div class="chart-card">
        <div class="d-flex justify-content-between align-items-center mb-0">
            <span class="chart-title" style="color: #3fb950;">PH (6.5-7.5)</span>
            <div id="status_ph"></div>
        </div>
        <div id="chart_ph" style="height: 90%; width: 100%;"></div>
    </div>
</div>

<div class="modal fade" id="fotoModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h6 class="modal-title" id="modalTitulo">Registro Detallado</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <img id="imgRegistro" src="" class="img-fluid rounded shadow mb-3">
        <div id="infoRegistro" class="p-2 rounded bg-dark small text-info font-monospace"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx4Cmdk612iYqcURZgdOsUNzjFHmd9tIM6Mv2yCYv2d7iNPwg5UpCcWNdSV4bhky6hz1g/exec";
    const LIMITS = { ppm: [30, 60], orp: [750, 850], ph: [6.5, 7.5] };
    
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(refresh);
    setInterval(refresh, 30000);

    function refresh() {
        fetch(WEB_APP_URL).then(r => r.json()).then(res => {
            const hoy = new Date().setHours(0,0,0,0);
            const rawData = res.slice(1).filter(f => new Date(f[0]).setHours(0,0,0,0) === hoy);
            document.getElementById('syncTime').innerText = "ACTUALIZADO: " + new Date().toLocaleTimeString();

            drawChart(rawData, 'chart_ppm', 'status_ppm', LIMITS.ppm, '#58a6ff', 2);
            drawChart(rawData, 'chart_orp', 'status_orp', LIMITS.orp, '#ffa657', 3);
            drawChart(rawData, 'chart_ph', 'status_ph', LIMITS.ph, '#3fb950', 4);
        });
    }

    function drawChart(data, divId, statusId, range, baseColor, colIdx) {
        if (data.length === 0) return;
        let dt = new google.visualization.DataTable();
        dt.addColumn('string', 'X');
        dt.addColumn('number', 'Valor');
        dt.addColumn({type: 'string', role: 'style'});
        dt.addColumn({type: 'string', role: 'annotation'});
        dt.addColumn('number', 'Min');
        dt.addColumn('number', 'Max');

        let minValEncontrado = range[0];
        let maxValEncontrado = range[1];

        data.forEach(f => {
            let h = new Date(f[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            let val = Number(f[colIdx]);
            if(val < minValEncontrado) minValEncontrado = val;
            if(val > maxValEncontrado) maxValEncontrado = val;

            let kilos = f[5] ? f[5] + "k" : "";
            let fuera = (val < range[0] || val > range[1]);
            let estilo = fuera ? 'point { size: 8; fill-color: #ff3b3b; visible: true; }' : 'point { size: 5; fill-color: ' + baseColor + '; visible: true; }';
            dt.addRow([h + "\n" + kilos, val, estilo, f[6] === "SI" ? "C" : null, range[0], range[1]]);
        });

        // ZOOM INTELIGENTE: Asegura que el punto más bajo/alto sea visible
        const padding = (range[1] - range[0]) * 0.4; 
        const vMin = Math.min(range[0], minValEncontrado) - padding;
        const vMax = Math.max(range[1], maxValEncontrado) + padding;

        const chart = new google.visualization.ComboChart(document.getElementById(divId));
        
        chart.draw(dt, {
            backgroundColor: 'transparent', 
            legend: 'none',
            chartArea: { width: '92%', height: '75%', top: 10, left: 45, right: 10, bottom: 45 },
            hAxis: { 
                textStyle: { color: '#8b949e', fontSize: 8 }, 
                gridlines: { color: 'transparent' }
            },
            vAxis: { 
                textStyle: { color: '#ffffff', fontSize: 9, bold: true }, 
                gridlines: { color: '#21262d' },
                viewWindow: { min: vMin, max: vMax },
                viewWindowMode: 'explicit',
                // Forzamos marcas en los límites y el centro
                ticks: [range[0], (range[0] + range[1])/2, range[1]],
                format: '#'
            },
            series: { 
                0: { color: baseColor, lineWidth: 3, pointsVisible: true }, 
                1: { color: '#ffffff', lineDashStyle: [4, 2], lineWidth: 1.5, pointSize: 0 }, 
                2: { color: '#ffffff', lineDashStyle: [4, 2], lineWidth: 1.5, pointSize: 0 } 
            },
            annotations: { textStyle: { fontSize: 10, color: '#ff7b72', bold: true, auraColor: 'none' } }
        });

        google.visualization.events.addListener(chart, 'select', function() {
            let sel = chart.getSelection()[0];
            if (sel && sel.row !== null) {
                let registro = data[sel.row];
                if (registro[7] && registro[7] !== "Sin foto") {
                    document.getElementById('imgRegistro').src = registro[7];
                    document.getElementById('infoRegistro').innerText = `OPERADOR: ${registro[1]} | ${registro[5]} KG`;
                    new bootstrap.Modal(document.getElementById('fotoModal')).show();
                }
            }
        });

        const ultimoVal = Number(data[data.length-1][colIdx]);
        const estaFuera = (ultimoVal < range[0] || ultimoVal > range[1]);
        document.getElementById(statusId).innerHTML = estaFuera ? '<span class="status-pill bg-danger-live">ALERTA</span>' : '<span class="status-pill bg-success-live">OK</span>';
    }
</script>
</body>
</html>
