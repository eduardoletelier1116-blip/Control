<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Rangos Críticos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { background-color: #050505; color: #ffffff; padding: 20px; font-family: 'Inter', sans-serif; }
        .chart-card { 
            background: #111; 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 1px solid #222;
        }
        h2 { font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .last-update { font-size: 0.8rem; color: #444; }
        .alerta-texto { color: #ff3b3b; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="text-center mb-4">
        <h2>Monitoreo de Parámetros</h2>
        <div class="last-update" id="updateTime">Esperando datos...</div>
    </div>

    <div class="row">
        <div class="col-12 mb-4">
            <div class="chart-card">
                <div class="d-flex justify-content-between">
                    <h5 style="color: #3498db;">PPM (Rango: 30 - 60)</h5>
                    <div id="status_ppm"></div>
                </div>
                <div id="chart_ppm" style="height: 250px;"></div>
            </div>
        </div>
        <div class="col-12 mb-4">
            <div class="chart-card">
                <div class="d-flex justify-content-between">
                    <h5 style="color: #e67e22;">ORP (Rango: 750 - 850)</h5>
                    <div id="status_orp"></div>
                </div>
                <div id="chart_orp" style="height: 250px;"></div>
            </div>
        </div>
        <div class="col-12 mb-4">
            <div class="chart-card">
                <div class="d-flex justify-content-between">
                    <h5 style="color: #2ecc71;">PH (Rango: 6.5 - 7.5)</h5>
                    <div id="status_ph"></div>
                </div>
                <div id="chart_ph" style="height: 250px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLJDQ1KOM0c-9ikGk8vzeiz3Flqy7ERL4SUckABpEYK3_902vUvboTTfqbwF2XFlfn-g/exec";
    const LÍMITES = {
        ppm: { min: 30, max: 60 },
        orp: { min: 750, max: 850 },
        ph: { min: 6.5, max: 7.5 }
    };

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(actualizar);
    setInterval(actualizar, 30000);

    function actualizar() {
        fetch(WEB_APP_URL).then(r => r.json()).then(res => {
            const hoy = new Date().setHours(0,0,0,0);
            const dataHoy = res.slice(1).filter(f => new Date(f[0]).setHours(0,0,0,0) === hoy);
            
            document.getElementById('updateTime').innerText = "Sincronizado: " + new Date().toLocaleTimeString();

            dibujar(dataHoy, 'ppm', 'chart_ppm', 'status_ppm', LÍMITES.ppm, '#3498db', 2);
            dibujar(dataHoy, 'orp', 'chart_orp', 'status_orp', LÍMITES.orp, '#e67e22', 3);
            dibujar(dataHoy, 'ph', 'chart_ph', 'status_ph', LÍMITES.ph, '#2ecc71', 4);
        });
    }

    function dibujar(datos, key, elementId, statusId, rango, colorBase, colIndex) {
        if (datos.length === 0) return;

        let tabla = new google.visualization.DataTable();
        tabla.addColumn('string', 'Hora');
        tabla.addColumn('number', 'Valor');
        tabla.addColumn({type: 'string', role: 'style'});
        tabla.addColumn('number', 'Límite Inferior');
        tabla.addColumn('number', 'Límite Superior');

        let hayAlerta = false;

        datos.forEach(f => {
            let hora = new Date(f[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            let kilos = f[5]; 
            let val = f[colIndex];
            
            // Etiqueta eje X: Hora + Kilos abajo
            let etiquetaX = hora + "\n(" + kilos + "kg)";
            
            let fuera = (val < rango.min || val > rango.max);
            if(fuera) hayAlerta = true;

            let estilo = fuera ? 'point { size: 8; fill-color: #ff3b3b; visible: true; }' : 'point { size: 4; fill-color: ' + colorBase + '; }';
            
            tabla.addRow([etiquetaX, val, estilo, rango.min, rango.max]);
        });

        document.getElementById(statusId).innerHTML = hayAlerta ? '<span class="alerta-texto">⚠️ FUERA DE RANGO</span>' : '<span style="color: #2ecc71;">● NORMAL</span>';

        const options = {
            backgroundColor: 'transparent',
            legend: 'none',
            chartArea: { width: '90%', height: '70%' },
            hAxis: { textStyle: { color: '#666', fontSize: 10 } },
            vAxis: { textStyle: { color: '#888' }, gridlines: { color: '#222' } },
            series: {
                0: { type: 'line', color: colorBase, lineWidth: 3 },
                1: { type: 'line', color: '#444', lineWidth: 1, lineDashStyle: [4, 4] },
                2: { type: 'line', color: '#444', lineWidth: 1, lineDashStyle: [4, 4] }
            }
        };

        new google.visualization.ComboChart(document.getElementById(elementId)).draw(tabla, options);
    }
</script>
</body>
</html>
