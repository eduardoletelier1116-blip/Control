<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Monitoreo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #0f172a; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .portal-card { background: #1e293b; border-radius: 30px; padding: 40px; width: 100%; max-width: 800px; text-align: center; border: 1px solid #334155; }
        .btn-monitor { padding: 30px; border-radius: 20px; font-size: 1.5rem; font-weight: bold; transition: 0.3s; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; }
        .btn-vaciado { background: #ef4444; color: white; border: none; }
        .btn-vaciado:hover { background: #dc2626; transform: translateY(-5px); color: white; }
        .btn-frigo { background: #0ea5e9; color: white; border: none; }
        .btn-frigo:hover { background: #0284c7; transform: translateY(-5px); color: white; }
        .logo-main { height: 80px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="portal-card shadow-lg">
    <img src="logo-icono.png" alt="Logo" class="logo-main">
    <h2 class="text-white fw-bold mb-4">CENTRO DE MONITOREO</h2>
    
    <div class="row g-4">
        <div class="col-md-6">
            <a href="monitor_vaciado.html" class="btn-monitor btn-vaciado">
                <i class="bi bi-water fs-1 mb-2"></i>
                VACIADO
                <small class="fs-6 opacity-75">Química y Flujo</small>
            </a>
        </div>
        <div class="col-md-6">
            <a href="monitor_frigo.html" class="btn-monitor btn-frigo">
                <i class="bi bi-snow fs-1 mb-2"></i>
                FRIGORÍFICO
                <small class="fs-6 opacity-75">Cámaras y Pulpa</small>
            </a>
        </div>
    </div>
</div>

</body>
</html>
