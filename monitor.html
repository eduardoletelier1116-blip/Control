<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Industrial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .kpi-card { background: #1e1e1e; border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .kpi-value { font-size: 2.5rem; font-weight: bold; color: #00e676; }
        .kpi-label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .chart-box { background: #1e1e1e; border-radius: 15px; padding: 15px; border: 1px solid #333; height: 350px; }
        h2 { font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row align-items-center mb-4">
        <div class="col-md-8">
            <h2>MONITOREO DE PROCESO <span id="fechaHoy" style="font-size: 1rem; color: #666;"></span></h2>
        </div>
        <div class="col-md-4">
            <div class="kpi-card py-2">
                <div class="kpi-label">Rendimiento Actual</div>
                <div class="kpi-value"><span id="kilosHora">0</span> <small style="font-size: 1rem;">Kg/h</small></div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-4"><div class="chart-box" id="chart_ppm"></div></div>
        <div class="col-md-4"><div class="chart-box" id="chart_orp"></div></div>
        <div class="col-md-4"><div class="chart-box" id="chart_ph"></div></div>
    </div>
</div>

<script>
    const WEB_APP_URL = "TU_URL_DE_APPS_SCRIPT_AQUI";
    document.getElementById('fechaHoy').innerText = " | " + new Date().toLocaleDateString();

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(cargarMonitor);
    setInterval(cargarMonitor, 30000); // Refresco cada 30 segundos

    function cargarMonitor() {
        fetch(WEB_APP_URL)
        .then(r => r.json())
        .then(res => {
            const hoy = new Date().setHours(0,0,0,0);
            
            // Filtramos solo los registros de HOY
            const datosHoy = res.slice(1).filter(f => new Date(f[0]).setHours(0,0,0,0) === hoy);

            if (datosHoy.length === 0) return;

            // --- CÁLCULO DE KILOS POR HORA ---
            const primerRegistro = new Date(datosHoy[0][0]);
            const ultimoRegistro = new Date(datosHoy[datosHoy.length - 1][0]);
            const totalKilos = datosHoy[datosHoy.length - 1][5]; // El último registro de kilos
            
            const diffHoras = (ultimoRegistro - primerRegistro) / (1000 * 60 * 60);
            const kgHora = diffHoras > 0 ? (totalKilos / diffHoras).toFixed(0) : totalKilos;
            document.getElementById('kilosHora').innerText = kgHora;

            // --- PREPARAR GRÁFICOS ---
            let dPPM = [["H", "PPM"]], dORP = [["H", "ORP"]], dPH = [["H", "PH"]];
            datosHoy.forEach(f => {
                let h = new Date(f[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                dPPM.push([h, f[2]]); dORP.push([h, f[3]]); dPH.push([h, f[4]]);
            });

            const opt = {
                backgroundColor: 'transparent',
                legend: 'none',
                hAxis: { textStyle: {color: '#666', fontSize: 10} },
                vAxis: { textStyle: {color: '#666'}, gridlines: {color: '#222'} },
                chartArea: {width:'85%', height:'75%'}
            };

            new google.visualization.LineChart(document.getElementById('chart_ppm')).draw(google.visualization.arrayToDataTable(dPPM), {...opt, title: 'PPM', titleTextStyle: {color:'#3498db'}, colors:['#3498db']});
            new google.visualization.LineChart(document.getElementById('chart_orp')).draw(google.visualization.arrayToDataTable(dORP), {...opt, title: 'ORP', titleTextStyle: {color:'#e67e22'}, colors:['#e67e22']});
            new google.visualization.LineChart(document.getElementById('chart_ph')).draw(google.visualization.arrayToDataTable(dPH), {...opt, title: 'PH', titleTextStyle: {color:'#2ecc71'}, colors:['#2ecc71']});
        });
    }
</script>
</body>
</html>
