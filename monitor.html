<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Central Industrial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { background-color: #050505; color: #fff; padding: 10px; height: 100vh; overflow: hidden; }
        .chart-card { background: #111; border-radius: 10px; padding: 10px; border: 1px solid #222; height: 30vh; margin-bottom: 1vh; }
        h6 { font-size: 0.8rem; margin: 0; }
        .status-pill { padding: 2px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; }
        .bg-danger-live { background-color: #ff3b3b; animation: blink 1.5s infinite; }
        .bg-success-live { background-color: #2ecc71; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="mb-0 fw-bold">PANEL DE CONTROL EN VIVO</h5>
        <div id="syncTime" style="color: #444; font-size: 0.7rem;">Sincronizando...</div>
    </div>

    <div class="chart-card">
        <div class="d-flex justify-content-between mb-1">
            <h6 style="color: #3498db;">PPM (30 - 60)</h6>
            <div id="status_ppm"></div>
        </div>
        <div id="chart_ppm" style="height: 90%;"></div>
    </div>

    <div class="chart-card">
        <div class="d-flex justify-content-between mb-1">
            <h6 style="color: #e67e22;">ORP (750 - 850)</h6>
            <div id="status_orp"></div>
        </div>
        <div id="chart_orp" style="height: 90%;"></div>
    </div>

    <div class="chart-card">
        <div class="d-flex justify-content-between mb-1">
            <h6 style="color: #2ecc71;">PH (6.5 - 7.5)</h6>
            <div id="status_ph"></div>
        </div>
        <div id="chart_ph" style="height: 90%;"></div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzvMblUnsikPSaGe_VpQVSIYHxrvFfoLiK-cgaY7iTWYnilk2djGQZS_OTtUYkQUhQrVw/exec";
    const LIMITS = { ppm: [30, 60], orp: [750, 850], ph: [6.5, 7.5] };

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(refresh);
    setInterval(refresh, 30000);

    function refresh() {
        fetch(WEB_APP_URL).then(r => r.json()).then(res => {
            const hoy = new Date().setHours(0,0,0,0);
            const dataHoy = res.slice(1).filter(f => new Date(f[0]).setHours(0,0,0,0) === hoy);
            document.getElementById('syncTime').innerText = "SINCRONIZADO: " + new Date().toLocaleTimeString();

            draw(dataHoy, 'chart_ppm', 'status_ppm', LIMITS.ppm, '#3498db', 2);
            draw(dataHoy, 'chart_orp', 'status_orp', LIMITS.orp, '#e67e22', 3);
            draw(dataHoy, 'chart_ph', 'status_ph', LIMITS.ph, '#2ecc71', 4);
        });
    }

    function draw(data, divId, statusId, range, baseColor, colIdx) {
        if (data.length === 0) return;

        let dt = new google.visualization.DataTable();
        dt.addColumn('string', 'H');
        dt.addColumn('number', 'Valor');
        dt.addColumn({type: 'string', role: 'style'});
        dt.addColumn({type: 'string', role: 'annotation'});
        dt.addColumn('number', 'Min');
        dt.addColumn('number', 'Max');

        const ultimo = data[data.length - 1];
        const estaFueraAhora = (ultimo[colIdx] < range[0] || ultimo[colIdx] > range[1]);

        data.forEach(f => {
            let h = new Date(f[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            let val = f[colIdx];
            let kilos = f[5];
            let esCorr = f[6] === "SI";
            
            let fuera = (val < range[0] || val > range[1]);
            // El punto se mantiene rojo si estuvo fuera de rango
            let punto = fuera ? 'point { size: 6; fill-color: #ff3b3b; }' : 'point { size: 3; fill-color: ' + baseColor + '; }';
            let anot = esCorr ? "CORRECCIÓN MANUAL" : null;
            
            dt.addRow([h + " (" + kilos + "k)", val, punto, anot, range[0], range[1]]);
        });

        const sDiv = document.getElementById(statusId);
        sDiv.innerHTML = estaFueraAhora ? '<span class="status-pill bg-danger-live">ALERTA</span>' : '<span class="status-pill bg-success-live">NORMAL</span>';

        const opt = {
            backgroundColor: 'transparent', legend: 'none',
            chartArea: { width: '92%', height: '70%', top: 10 },
            hAxis: { textStyle: { color: '#444', fontSize: 8 } },
            vAxis: { textStyle: { color: '#666', fontSize: 9 }, gridlines: { color: '#1a1a1a' } },
            series: {
                0: { type: 'line', color: baseColor, lineWidth: 2 },
                1: { type: 'line', color: '#333', lineWidth: 1, lineDashStyle: [3, 3] },
                2: { type: 'line', color: '#333', lineWidth: 1, lineDashStyle: [3, 3] }
            },
            annotations: { 
                textStyle: { fontSize: 9, color: '#f8d7da', bold: true },
                alwaysOutside: true 
            }
        };

        new google.visualization.ComboChart(document.getElementById(divId)).draw(dt, opt);
    }
</script>
</body>
</html>
