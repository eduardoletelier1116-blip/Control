<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Industrial - Control de Calidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; padding: 15px; font-family: 'Roboto', sans-serif; }
        .kpi-container { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .kpi-box { background: #1a1a1a; padding: 15px; border-radius: 10px; border-bottom: 4px solid #444; min-width: 150px; }
        .kpi-box.alerta { border-bottom-color: #ff5252; animation: pulse 2s infinite; }
        .chart-card { background: #1a1a1a; border-radius: 12px; padding: 10px; margin-bottom: 15px; border: 1px solid #333; }
        h6 { color: #888; text-transform: uppercase; font-size: 0.75rem; margin-bottom: 10px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); } }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>Panel de Control <small id="lastUpdate" style="font-size: 0.8rem; color: #555;"></small></h4>
        <div class="kpi-box" id="kpiKilos">
            <h6>Rendimiento</h6>
            <div class="h4 mb-0"><span id="kgHora">0</span> <small>Kg/h</small></div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-6 col-lg-4">
            <div class="chart-card">
                <h6>PPM (30-60)</h6>
                <div id="chart_ppm" style="height: 250px;"></div>
            </div>
        </div>
        <div class="col-md-6 col-lg-4">
            <div class="chart-card">
                <h6>ORP (750-850)</h6>
                <div id="chart_orp" style="height: 250px;"></div>
            </div>
        </div>
        <div class="col-md-6 col-lg-4">
            <div class="chart-card">
                <h6>PH (6.5-7.5)</h6>
                <div id="chart_ph" style="height: 250px;"></div>
            </div>
        </div>
        <div class="col-12">
            <div class="chart-card">
                <h6>Kilos procesados por intervalo</h6>
                <div id="chart_kilos" style="height: 200px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLJDQ1KOM0c-9ikGk8vzeiz3Flqy7ERL4SUckABpEYK3_902vUvboTTfqbwF2XFlfn-g/exec";
    const RANGOS = { ppm: [30, 60], orp: [750, 850], ph: [6.5, 7.5] };

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(actualizarMonitor);
    setInterval(actualizarMonitor, 30000);

    function actualizarMonitor() {
        fetch(WEB_APP_URL).then(r => r.json()).then(res => {
            const hoy = new Date().setHours(0,0,0,0);
            const dataHoy = res.slice(1).filter(f => new Date(f[0]).setHours(0,0,0,0) === hoy);
            if (dataHoy.length === 0) return;

            document.getElementById('lastUpdate').innerText = "Actualizado: " + new Date().toLocaleTimeString();

            // 1. CÁLCULO KILOS POR HORA Y POR INTERVALO
            let dKilos = [["Hora", "Kilos"]];
            let totalKg = 0;
            dataHoy.forEach((f, i) => {
                let hora = new Date(f[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                let actual = f[5];
                let anterior = i > 0 ? dataHoy[i-1][5] : 0;
                let procesadoEnIntervalo = actual - anterior;
                dKilos.push([hora, procesadoEnIntervalo]);
                totalKg = actual;
            });

            const inicio = new Date(dataHoy[0][0]);
            const fin = new Date(dataHoy[dataHoy.length - 1][0]);
            const horasTranscurridas = (fin - inicio) / 3600000 || 1;
            document.getElementById('kgHora').innerText = (totalKg / horasTranscurridas).toFixed(0);

            // 2. PREPARAR DATOS DE PARÁMETROS
            let dPPM = [["H", "PPM", {role:'style'}]];
            let dORP = [["H", "ORP", {role:'style'}]];
            let dPH = [["H", "PH", {role:'style'}]];

            dataHoy.forEach(f => {
                let h = new Date(f[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                let ppm = f[2], orp = f[3], ph = f[4];
                
                // Si el valor está fuera de rango, el punto se vuelve rojo
                let sPPM = (ppm < RANGOS.ppm[0] || ppm > RANGOS.ppm[1]) ? 'point { size: 6; fill-color: #ff5252; }' : 'point { fill-color: #3498db; }';
                let sORP = (orp < RANGOS.orp[0] || orp > RANGOS.orp[1]) ? 'point { size: 6; fill-color: #ff5252; }' : 'point { fill-color: #e67e22; }';
                let sPH = (ph < RANGOS.ph[0] || ph > RANGOS.ph[1]) ? 'point { size: 6; fill-color: #ff5252; }' : 'point { fill-color: #2ecc71; }';
                
                dPPM.push([h, ppm, sPPM]);
                dORP.push([h, orp, sORP]);
                dPH.push([h, ph, sPH]);
            });

            const baseOpt = {
                backgroundColor: 'transparent', legend: 'none',
                hAxis: { textStyle: {color: '#555', fontSize: 9} },
                vAxis: { textStyle: {color: '#888'} },
                chartArea: { width: '85%', height: '75%' }
            };

            // Dibujar Gráficos con líneas de rango
            new google.visualization.LineChart(document.getElementById('chart_ppm')).draw(google.visualization.arrayToDataTable(dPPM), {...baseOpt, colors:['#3498db']});
            new google.visualization.LineChart(document.getElementById('chart_orp')).draw(google.visualization.arrayToDataTable(dORP), {...baseOpt, colors:['#e67e22']});
            new google.visualization.LineChart(document.getElementById('chart_ph')).draw(google.visualization.arrayToDataTable(dPH), {...baseOpt, colors:['#2ecc71']});
            new google.visualization.ColumnChart(document.getElementById('chart_kilos')).draw(google.visualization.arrayToDataTable(dKilos), {...baseOpt, colors:['#9b59b6']});
        });
    }
</script>
</body>
</html>
