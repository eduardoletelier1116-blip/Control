<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Industrial Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #f0f2f5; 
            padding: 15px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .card { 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            border: none; 
            max-width: 480px; 
            margin: auto; 
            overflow: hidden;
        }

        .header-accent {
            background: #ffffff;
            padding: 25px;
            text-align: center;
            border-bottom: 4px solid #198754;
        }

        .logo-img { height: 60px; width: auto; margin-bottom: 10px; }
        
        .form-label { font-size: 0.75rem; color: #555; margin-bottom: 4px; }
        
        .input-group-text { background-color: #fff; border-right: none; color: #198754; }
        .form-control { border-left: none; padding: 12px; font-size: 1rem; }
        .form-control:focus { box-shadow: none; border-color: #ced4da; }
        
        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.1);
            border-radius: 0.375rem;
        }

        .switch-container {
            background-color: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed #dee2e6;
        }

        .btn-save {
            padding: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(25, 135, 84, 0.3); }

        /* Estilo para el input de archivo */
        .file-label {
            display: block;
            background: #e9ecef;
            border: 2px dashed #ced4da;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .file-label:hover { background: #dee2e6; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="card">
        <div class="header-accent">
            <img src="logo-icono.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
            <h4 class="fw-extrabold mb-0" style="color: #333;">REGISTRO DE CONTROL</h4>
            <p class="text-muted small mb-0">Industrialización de Fruta</p>
        </div>

        <div class="card-body p-4">
            <form id="formControl">
                <div class="mb-3">
                    <label class="form-label fw-bold uppercase">OPERADOR RESPONSABLE</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                        <input type="text" id="operador" class="form-control" placeholder="Nombre completo" required>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label fw-bold">PPM</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-droplet"></i></span>
                            <input type="number" id="ppm" class="form-control" step="0.1" placeholder="0.0" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold">ORP</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lightning"></i></span>
                            <input type="number" id="orp" class="form-control" placeholder="0" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold">PH</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-water"></i></span>
                            <input type="number" id="ph" class="form-control" step="0.1" placeholder="0.0" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold">KILOS</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-box-seam"></i></span>
                            <input type="number" id="kilos" class="form-control" placeholder="0" required>
                        </div>
                    </div>
                </div>

                <div class="switch-container d-flex justify-content-between align-items-center">
                    <label class="fw-bold mb-0" for="esCorreccion"><i class="bi bi-gear-fill me-2"></i>¿ES CORRECCIÓN?</label>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="esCorreccion" style="width: 2.5em; height: 1.25em;">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">FOTO DE RESPALDO (Obligatoria)</label>
                    <input type="file" id="fotoInput" class="form-control d-none" accept="image/*" capture="environment">
                    <label for="fotoInput" class="file-label" id="fileLabel">
                        <i class="bi bi-camera-fill fs-3 d-block text-success"></i>
                        <span id="fileName">Tocar para tomar foto</span>
                    </label>
                </div>

                <button type="submit" id="btnEnviar" class="btn btn-success w-100 btn-save shadow-sm">
                    <i class="bi bi-cloud-upload me-2"></i>GUARDAR REGISTRO
                </button>
            </form>
        </div>
    </div>
    
    <div id="mensaje" class="alert alert-success mt-3 d-none text-center fw-bold animate__animated animate__fadeIn">
        ✅ REGISTRO PROCESADO CON ÉXITO
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx_gL3X4Fvd--qgF-vUJAUpRQkmLDeDfLgHEsD9vCYP9b_wV7lRHexe-vvsF4mxFHVObA/exec";

    // Mostrar nombre del archivo seleccionado
    document.getElementById('fotoInput').addEventListener('change', function(e) {
        const name = e.target.files[0] ? e.target.files[0].name : "Tocar para tomar foto";
        document.getElementById('fileName').innerText = "✅ Foto cargada";
        document.getElementById('fileLabel').style.borderColor = "#198754";
    });

    document.getElementById('formControl').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const fotoFile = document.getElementById('fotoInput').files[0];
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> SUBIENDO...';

        if (fotoFile) {
            const reader = new FileReader();
            reader.onloadend = () => enviarDatos(reader.result);
            reader.readAsDataURL(fotoFile);
        } else {
            enviarDatos(null);
        }
    });

    function enviarDatos(fotoBase64) {
        const datos = {
            operador: document.getElementById('operador').value,
            ppm: parseFloat(document.getElementById('ppm').value),
            orp: parseInt(document.getElementById('orp').value),
            ph: parseFloat(document.getElementById('ph').value),
            kilos: parseInt(document.getElementById('kilos').value),
            correccion: document.getElementById('esCorreccion').checked,
            foto: fotoBase64
        };

        fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
        .then(() => {
            const msj = document.getElementById('mensaje');
            msj.classList.remove('d-none');
            document.getElementById('formControl').reset();
            document.getElementById('fileName').innerText = "Tocar para tomar foto";
            document.getElementById('fileLabel').style.borderColor = "#ced4da";
            
            setTimeout(() => { msj.classList.add('d-none'); }, 3000);
        })
        .catch(err => alert("Error: " + err))
        .finally(() => {
            const btn = document.getElementById('btnEnviar');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-cloud-upload me-2"></i>GUARDAR REGISTRO';
        });
    }
</script>
</body>
</html>
